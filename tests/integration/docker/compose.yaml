services:
  clickhouse:
    build:
      context: ../../..
      dockerfile: tests/integration/docker/Dockerfile
      args:
        CLICKHOUSE_VERSION: ${CLICKHOUSE_VERSION:-25.8}
    container_name: chdiag-test-${CLICKHOUSE_VERSION_TAG:-25-8}
    restart: unless-stopped
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    ports:
      - "${CLICKHOUSE_NATIVE_PORT:-19001}:9000"
      - "${CLICKHOUSE_TLS_PORT:-19440}:9440"
      - "${CHDIAG_SSH_PORT:-12222}:22"
    volumes:
      - ./chdiag_cluster.xml:/etc/clickhouse-server/config.d/chdiag_cluster.xml:ro
      - ${CHDIAG_TEST_PUBLIC_KEY_DIR:-./state}/authorized_keys:/test-ssh/authorized_keys:ro
      - chdiag-data:/var/lib/clickhouse

volumes:
  chdiag-data:
    name: chdiag-test-${CLICKHOUSE_VERSION_TAG:-25-8}-data
