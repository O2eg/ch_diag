metric_catalog:
  schema_version: 5
  defaults:
    mode: snapshots
    x: snapshot_time
sampler_providers:
  linux_os:
    implementation: ch_diag.samplers
    config:
      proc_script: samplers/linux_proc.sh
      iostat_script: samplers/linux_iostat.sh
      process_script: samplers/clickhouse_process.sh
      process_library: lib/clickhouse_process.sh
    outputs:
      os.cpu:
        collection_scope: every_snapshot
        source_file: samplers/linux_proc.sh
      os.memory:
        collection_scope: every_snapshot
        source_file: samplers/linux_proc.sh
      os.disk:
        collection_scope: every_snapshot
        source_file: samplers/linux_iostat.sh
      os.network:
        collection_scope: every_snapshot
        source_file: samplers/linux_proc.sh
      clickhouse.process:
        collection_scope: every_snapshot
        source_file: samplers/clickhouse_process.sh
      clickhouse.threads:
        collection_scope: every_snapshot
        source_file: samplers/clickhouse_process.sh
      clickhouse.thread_pools:
        collection_scope: every_snapshot
        source_file: samplers/clickhouse_process.sh
metrics:
  clickhouse.process_cpu:
    title: ClickHouse Server Process CPU
    source_sampler: clickhouse.process
    series:
    - name: process CPU
      value_ref: cpu_pct
      transform: gauge
      unit: '%'
    chart:
      kind: area
      unit: '%'
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.process_memory:
    title: ClickHouse Server Process Resident Memory
    source_sampler: clickhouse.process
    series:
    - name: resident memory
      value_ref: rss_bytes
      transform: gauge
      unit: bytes
    chart:
      kind: area
      unit: bytes
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.process_io:
    title: ClickHouse Server Process I/O
    source_sampler: clickhouse.process
    requires_fields:
    - read_bytes_per_sec
    - write_bytes_per_sec
    series:
    - name: read
      value_ref: read_bytes_per_sec
      transform: gauge
      unit: bytes/s
    - name: write
      value_ref: write_bytes_per_sec
      transform: gauge
      unit: bytes/s
    chart:
      kind: stacked_area
      unit: bytes/s
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.thread_cpu_top:
    title: Top ClickHouse Linux Threads By CPU
    source_sampler: clickhouse.threads
    display:
      default_sort:
        column: avg_cpu_pct
        direction: desc
    table:
      key_refs: [tid, starttime]
      drop_zero_refs: [cpu_pct]
      limit: 50
      sort: {column: avg_cpu_pct, direction: desc}
      columns:
      - {name: tid, role: key, key_index: 0, source_type: UInt64, label: Linux TID}
      - {name: thread_start_ticks, role: key, key_index: 1, source_type: UInt64}
      - {name: thread_name, ref: thread_name, transform: last, source_type: String}
      - {name: state, ref: state, transform: last, source_type: String}
      - {name: avg_cpu_pct, value_ref: cpu_pct, transform: avg, source_type: Float64, quantity: percentage, unit: '%', quality: derived}
      - {name: max_cpu_pct, value_ref: cpu_pct, transform: max, source_type: Float64, quantity: percentage, unit: '%', quality: derived}
      - {name: samples, transform: sample_count, source_type: UInt64, quality: derived}
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: host_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
  clickhouse.thread_io_top:
    title: Top ClickHouse Linux Threads By I/O
    source_sampler: clickhouse.threads
    requires_fields: [read_bytes_per_sec, write_bytes_per_sec]
    display:
      default_sort:
        column: avg_read_bytes_per_sec
        direction: desc
    table:
      key_refs: [tid, starttime]
      drop_zero_refs: [read_bytes_per_sec, write_bytes_per_sec]
      limit: 50
      sort: {column: avg_read_bytes_per_sec, direction: desc}
      columns:
      - {name: tid, role: key, key_index: 0, source_type: UInt64, label: Linux TID}
      - {name: thread_start_ticks, role: key, key_index: 1, source_type: UInt64}
      - {name: thread_name, ref: thread_name, transform: last, source_type: String}
      - {name: io_access, ref: io_access, transform: last, source_type: Bool}
      - {name: avg_read_bytes_per_sec, value_ref: read_bytes_per_sec, transform: avg, source_type: Float64, quantity: data_rate, unit: bytes/s, quality: derived}
      - {name: avg_write_bytes_per_sec, value_ref: write_bytes_per_sec, transform: avg, source_type: Float64, quantity: data_rate, unit: bytes/s, quality: derived}
      - {name: max_read_bytes_per_sec, value_ref: read_bytes_per_sec, transform: max, source_type: Float64, quantity: data_rate, unit: bytes/s, quality: derived}
      - {name: max_write_bytes_per_sec, value_ref: write_bytes_per_sec, transform: max, source_type: Float64, quantity: data_rate, unit: bytes/s, quality: derived}
      - {name: samples, transform: sample_count, source_type: UInt64, quality: derived}
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: host_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
  clickhouse.thread_pool_usage:
    title: ClickHouse Thread And Pool Resource Usage
    source_sampler: clickhouse.thread_pools
    display:
      default_sort:
        column: avg_cpu_pct
        direction: desc
    table:
      key_refs: [thread_name]
      limit: 100
      sort: {column: avg_cpu_pct, direction: desc}
      columns:
      - {name: thread_name, role: key, key_index: 0, source_type: String}
      - {name: avg_threads, value_ref: thread_count, transform: avg, source_type: Float64, quantity: threads, unit: count, quality: derived}
      - {name: max_threads, value_ref: thread_count, transform: max, source_type: UInt64, quantity: threads, unit: count, quality: derived}
      - {name: avg_cpu_pct, value_ref: cpu_pct, transform: avg, source_type: Nullable(Float64), quantity: percentage, unit: '%', quality: derived}
      - {name: max_cpu_pct, value_ref: cpu_pct, transform: max, source_type: Nullable(Float64), quantity: percentage, unit: '%', quality: derived}
      - {name: avg_read_bytes_per_sec, value_ref: read_bytes_per_sec, transform: avg, source_type: Nullable(Float64), quantity: data_rate, unit: bytes/s, quality: derived}
      - {name: avg_write_bytes_per_sec, value_ref: write_bytes_per_sec, transform: avg, source_type: Nullable(Float64), quantity: data_rate, unit: bytes/s, quality: derived}
      - {name: max_io_access_threads, value_ref: io_access_threads, transform: max, source_type: UInt64, quantity: threads, unit: count, quality: derived}
      - {name: samples, transform: sample_count, source_type: UInt64, quality: derived}
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: host_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
  clickhouse.logged_thread_cpu_top:
    title: Top Logged Query Threads By CPU
    source_query: metrics.logged_thread_cpu_top
    display:
      default_sort:
        column: cpu_seconds
        direction: desc
    table:
      drop_zero_refs: [cpu_seconds]
      limit: 50
      sort: {column: cpu_seconds, direction: desc}
      columns:
      - {name: host, ref: host, transform: last, source_type: String}
      - {name: event_time, ref: event_time, transform: last, source_type: DateTime}
      - {name: tid, ref: thread_id, transform: last, source_type: UInt64, label: Linux TID}
      - {name: query_id, ref: query_id, transform: last, source_type: String}
      - {name: thread_name, ref: thread_name, transform: last, source_type: String}
      - {name: user, ref: user, transform: last, source_type: String}
      - {name: query_duration_ms, ref: query_duration_ms, transform: last, source_type: UInt64}
      - {name: cpu_seconds, ref: cpu_seconds, transform: last, source_type: Float64, quantity: seconds, unit: s, quality: derived}
      - {name: cpu_wait_seconds, ref: cpu_wait_seconds, transform: last, source_type: Float64, quantity: seconds, unit: s, quality: derived}
      - {name: memory_usage, ref: memory_usage, transform: last, source_type: Int64}
      - {name: peak_memory_usage, ref: peak_memory_usage, transform: last, source_type: Int64}
      - {name: query, ref: query, transform: last, source_type: String}
    collection_scope: window_end
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
  clickhouse.logged_thread_io_top:
    title: Top Logged Query Threads By I/O
    source_query: metrics.logged_thread_io_top
    display:
      default_sort:
        column: os_io_bytes
        direction: desc
    table:
      drop_zero_refs: [os_io_bytes]
      limit: 50
      sort: {column: os_io_bytes, direction: desc}
      columns:
      - {name: host, ref: host, transform: last, source_type: String}
      - {name: event_time, ref: event_time, transform: last, source_type: DateTime}
      - {name: tid, ref: thread_id, transform: last, source_type: UInt64, label: Linux TID}
      - {name: query_id, ref: query_id, transform: last, source_type: String}
      - {name: thread_name, ref: thread_name, transform: last, source_type: String}
      - {name: user, ref: user, transform: last, source_type: String}
      - {name: os_read_bytes, ref: os_read_bytes, transform: last, source_type: UInt64}
      - {name: os_write_bytes, ref: os_write_bytes, transform: last, source_type: UInt64}
      - {name: os_io_bytes, ref: os_io_bytes, transform: last, source_type: UInt64}
      - {name: peak_memory_usage, ref: peak_memory_usage, transform: last, source_type: Int64}
      - {name: query, ref: query, transform: last, source_type: String}
    collection_scope: window_end
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
  os.cpu_utilization:
    title: CPU Utilization
    source_sampler: os.cpu
    series:
    - name: user
      value_ref: user_pct
      transform: gauge
      unit: '%'
      color: '#93d083'
    - name: system
      value_ref: system_pct
      transform: gauge
      unit: '%'
      color: '#e98996'
    - name: iowait
      value_ref: iowait_pct
      transform: gauge
      unit: '%'
      color: '#efd05f'
    - name: steal
      value_ref: steal_pct
      transform: gauge
      unit: '%'
      color: '#e7a764'
    - name: idle
      value_ref: idle_pct
      transform: gauge
      unit: '%'
      color: '#aeb4bd'
    chart:
      kind: stacked_area
      series_order: configured
      unit: '%'
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.cpu_load:
    title: CPU Load Average
    source_sampler: os.cpu
    series:
    - name: load1
      value_ref: load1
      transform: gauge
      unit: load
    - name: load5
      value_ref: load5
      transform: gauge
      unit: load
    - name: load15
      value_ref: load15
      transform: gauge
      unit: load
    chart:
      kind: line
      unit: load
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.memory_usage:
    title: Memory Usage
    source_sampler: os.memory
    series:
    - name: Application memory
      value_ref: application_bytes
      transform: gauge
      unit: bytes
      color: '#93d083'
    - name: Page cache
      value_ref: cached_bytes
      transform: gauge
      unit: bytes
      color: '#b38ee8'
    - name: Shared memory
      value_ref: shared_bytes
      transform: gauge
      unit: bytes
      color: '#84c8e7'
    - name: Buffers
      value_ref: buffers_bytes
      transform: gauge
      unit: bytes
      color: '#e7a764'
    - name: Slab reclaimable
      value_ref: slab_reclaimable_bytes
      transform: gauge
      unit: bytes
      color: '#efd05f'
    - name: Slab unreclaimable
      value_ref: slab_unreclaimable_bytes
      transform: gauge
      unit: bytes
      color: '#d6b45d'
    - name: Page tables
      value_ref: page_tables_bytes
      transform: gauge
      unit: bytes
      color: '#8f9ae8'
    - name: Kernel stack
      value_ref: kernel_stack_bytes
      transform: gauge
      unit: bytes
      color: '#aeb4bd'
    - name: Swap cache
      value_ref: swap_cached_bytes
      transform: gauge
      unit: bytes
      color: '#e98996'
    - name: Free
      value_ref: free_bytes
      transform: gauge
      unit: bytes
      color: '#c9ea5f'
    chart:
      kind: stacked_area
      series_order: configured
      unit: bytes
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.memory_pressure:
    title: RAM And Swap Usage
    source_sampler: os.memory
    series:
    - name: RAM used
      value_ref: used_pct
      transform: gauge
      unit: '%'
    - name: swap used
      value_ref: swap_used_pct
      transform: gauge
      unit: '%'
    chart:
      kind: line
      unit: '%'
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.disk_read_throughput:
    title: Disk Read Throughput
    source_sampler: os.disk
    partition_by:
    - device
    series:
    - name: read
      value_ref: read_bytes_per_sec
      transform: gauge
      unit: bytes/s
    chart:
      kind: area
      unit: bytes/s
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.disk_write_throughput:
    title: Disk Write Throughput
    source_sampler: os.disk
    partition_by:
    - device
    series:
    - name: write
      value_ref: write_bytes_per_sec
      transform: gauge
      unit: bytes/s
    chart:
      kind: area
      unit: bytes/s
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.disk_iops:
    title: Disk IOPS
    source_sampler: os.disk
    partition_by:
    - device
    series:
    - name: read iops
      value_ref: read_iops
      transform: gauge
      unit: iops
    - name: write iops
      value_ref: write_iops
      transform: gauge
      unit: iops
    chart:
      kind: stacked_area
      unit: iops
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.disk_utilization:
    title: Disk Utilization
    source_sampler: os.disk
    partition_by:
    - device
    series:
    - name: util
      value_ref: util_pct
      transform: gauge
      unit: '%'
    chart:
      kind: area
      unit: '%'
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.disk_latency:
    title: Disk Latency
    source_sampler: os.disk
    partition_by:
    - device
    series:
    - name: await
      value_ref: await_ms
      transform: gauge
      unit: ms
    - name: read await
      value_ref: r_await_ms
      transform: gauge
      unit: ms
    - name: write await
      value_ref: w_await_ms
      transform: gauge
      unit: ms
    chart:
      kind: line
      unit: ms
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  os.network_receive_throughput:
