    source_sampler: os.network
    partition_by:
    - interface
    series:
    - name: rx packets
      value_ref: rx_packets_per_sec
      transform: gauge
      unit: packets/s
    - name: tx packets
      value_ref: tx_packets_per_sec
      transform: gauge
      unit: packets/s
    chart:
      kind: stacked_area
      unit: packets/s
    collection_scope: every_snapshot
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.query_rate:
    title: ClickHouse Query Rate
    source_query: metrics.query_rate
    partition_by:
    - host
    series:
    - name: queries
      value_ref: queries
      transform: rate
      unit: queries/s
    - name: selects
      value_ref: selects
      transform: rate
      unit: queries/s
    - name: inserts
      value_ref: inserts
      transform: rate
      unit: queries/s
    - name: failed
      value_ref: failed_queries
      transform: rate
      unit: queries/s
    chart:
      kind: stacked_area
      unit: queries/s
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.row_rate:
    title: ClickHouse Row Rate
    source_query: metrics.row_rate
    partition_by:
    - host
    series:
    - name: inserted
      value_ref: inserted_rows
      transform: rate
      unit: rows/s
    - name: read
      value_ref: read_rows
      transform: rate
      unit: rows/s
    chart:
      kind: stacked_area
      unit: rows/s
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.byte_rate:
