    source_query: metrics.byte_rate
    partition_by:
    - host
    series:
    - name: inserted
      value_ref: inserted_bytes
      transform: rate
      unit: bytes/s
    - name: read
      value_ref: read_bytes
      transform: rate
      unit: bytes/s
    chart:
      kind: stacked_area
      unit: bytes/s
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.activity:
