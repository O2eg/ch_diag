    source_query: metrics.activity
    partition_by:
    - host
    series:
    - name: queries
      value_ref: current_queries
      transform: gauge
      unit: count
    - name: merges
      value_ref: current_merges
      transform: gauge
      unit: count
    - name: mutations
      value_ref: current_mutations
      transform: gauge
      unit: count
    - name: distributed sends
      value_ref: distributed_sends
      transform: gauge
      unit: count
    chart:
      kind: line
      unit: count
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.memory:
    title: ClickHouse Memory Tracking
    source_query: metrics.memory
    partition_by:
    - host
    series:
    - name: memory
      value_ref: memory_bytes
      transform: gauge
      unit: bytes
    chart:
      kind: area
      unit: bytes
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.replication_activity:
    title: Replication Fetch And Send Activity
    source_query: metrics.replication_activity
    partition_by:
    - host
    series:
    - name: fetches
      value_ref: replicated_fetches
      transform: gauge
      unit: count
    - name: sends
      value_ref: replicated_sends
      transform: gauge
      unit: count
    chart:
      kind: line
      unit: count
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.replication_queue:
    title: Replication Queue And Delay
    source_query: metrics.replication_queue
    partition_by:
    - host
    series:
    - name: queue
      value_ref: queue_size
      transform: gauge
      unit: count
    - name: readonly replicas
      value_ref: readonly_replicas
      transform: gauge
      unit: count
    chart:
      kind: line
      unit: count
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.part_creation_rate:
    title: New Data Parts Per Second
    source_query: metrics.part_creation_rate
    partition_by:
    - host
    series:
    - name: new parts
      value_ref: created_parts
      transform: rate
      unit: count
    chart:
      kind: area
      unit: count
    collection_scope: every_snapshot
    cost_class: medium
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: chart
      unit_policy: raw_then_renderer_scaled
      may_be_empty: true
  clickhouse.keeper_events:
    title: Keeper And ZooKeeper Event Rate
    source_query: metrics.keeper_events
    partition_by:
    - host
    series:
    - name: keeper events
      value_ref: keeper_events
      transform: rate
      unit: count
    chart:
