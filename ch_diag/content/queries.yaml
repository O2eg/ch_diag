      - node
      sql_file: overview/server_node.sql
    - id: overview_server_cluster
      min_ch_version: '20.3'
      scopes:
      - cluster
      sql_file: overview/server_cluster.sql
    collection_scope: once
    cost_class: low
    privilege_profile: clickhouse_system_read
