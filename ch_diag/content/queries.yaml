    description: Queue, delay and active-replica state for local replicated tables.
    timeout_seconds: 10
    variants:
    - id: troubleshooting_replication_summary_node
      min_ch_version: '20.3'
      scopes:
      - node
      sql_file: troubleshooting/replication_summary_node.sql
    - id: troubleshooting_replication_summary_cluster
      min_ch_version: '20.3'
      scopes:
      - cluster
      sql_file: troubleshooting/replication_summary_cluster.sql
    collection_scope: once
    cost_class: high
    privilege_profile: clickhouse_system_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
    semantic_contract:
      source_tables:
      - system.replicas
      legacy_equivalent: null
      collector_limits_apply: true
