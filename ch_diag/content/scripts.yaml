script_catalog:
  schema_version: 5
  script_root: scripts
  defaults:
    output: plain_text
    timeout_seconds: 3
scripts:
  clickhouse.process_tree:
    title: ClickHouse Server Process Tree
    description: Main ClickHouse server selected by the connected native port and its child processes.
    file: clickhouse/process_tree.sh
    library: lib/clickhouse_process.sh
    timeout_seconds: 3
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: plain_text
      unit_policy: raw
      may_be_empty: true
  clickhouse.linked_libraries:
    title: ClickHouse Server Linked Libraries
    description: One-shot ldd output for the executable of the ClickHouse server bound to the connected
      native port.
    file: clickhouse/linked_libraries.sh
    library: lib/clickhouse_process.sh
    timeout_seconds: 5
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: plain_text
      unit_policy: raw
      may_be_empty: true
  clickhouse.process_context:
    title: ClickHouse Process Limits And Security Context
    description: Command, executable, resource limits and kernel security state for the selected ClickHouse
      server.
    file: clickhouse/process_context.sh
    library: lib/clickhouse_process.sh
    timeout_seconds: 3
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: plain_text
      unit_policy: raw
      may_be_empty: true
  clickhouse.config_permissions:
    title: ClickHouse Configuration And Data Path Permissions
    description: Ownership and modes for the connected server configuration and conventional
      data/log paths, with world-writable paths marked explicitly.
    file: clickhouse/config_permissions.sh
    library: lib/clickhouse_process.sh
    timeout_seconds: 3
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: plain_text
      unit_policy: raw
      may_be_empty: true
  os.kernel_version:
    title: Kernel And Architecture
    description: uname output from the collected host.
    file: os/uname_a.sh
    timeout_seconds: 2
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: plain_text
      unit_policy: raw
      may_be_empty: true
  os.os_release:
    title: OS Distribution
    description: Distribution identification from /etc/os-release.
    file: os/etc_os_release.sh
    timeout_seconds: 2
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: plain_text
      unit_policy: raw
      may_be_empty: true
  os.memory_info:
    title: Memory Information
    description: Selected procfs memory counters normalized to exact bytes or counts.
    file: os/sys_memory_total.sh
    output: table_json
    timeout_seconds: 2
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
      columns:
        metric:
          label: Metric
        value_normalized:
          label: Value
          value_kind: integer
          semantic_role: gauge
          quantity_ref: quantity_normalized
          unit_ref: unit_normalized
          quality: exact
          nullable: false
          encoding: decimal_string
        unit_normalized:
          label: Unit
          value_kind: text
          semantic_role: state
          quantity: unit_code
          unit: none
          quality: exact
          nullable: false
          encoding: json_string
        quantity_normalized:
          label: Quantity
          value_kind: text
          semantic_role: state
          quantity: quantity_code
          unit: none
          quality: exact
          nullable: false
          encoding: json_string
  os.total_ram:
    title: Total RAM Capacity
    description: Exact total host RAM bytes from procfs.
    file: os/total_ram.sh
    output: table_json
    timeout_seconds: 2
    collection_scope: once
    cost_class: low
    privilege_profile: host_read
    result_contract:
      kind: table
      unit_policy: raw
      may_be_empty: true
  os.cpu_info:
