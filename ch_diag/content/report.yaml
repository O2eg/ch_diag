report:
  id: ch_diag
  title: ClickHouse Diagnostic Report
  description: Read-only ClickHouse and operating-system diagnostics.
  schema_version: 5
  allowed_item_tags:
  - Activity
  - CPU
  - Cluster
  - Configuration
  - Databases
  - Disk
  - Errors
  - Hardware
  - I/O
  - Memory
  - Network
  - Queries
  - Replication
  - Security
  - Snapshots
  - Storage
  - Tables
runtime_policy:
  default_sql_timeout_seconds: 5
  database_workers: 4
  default_shell_timeout_seconds: 2
  max_result_rows: 10000
  max_result_bytes: 67108864
  max_artifact_bytes: 134217728
  max_snapshot_count: 360
  max_cluster_targets: 32
  max_series_per_chart: 200
  max_points_per_series: 2000
  max_total_chart_points: 200000
  fail_fast: false
defaults:
  numeric_locale: en-US
  table:
    page_size: 25
  item:
    state: collapsed
  section:
    state: expanded
sections:
  overview:
    title: Overview
    description: Connected ClickHouse server and topology.
    items:
      server:
        query: overview.server
        tags:
        - Configuration
        - Cluster
        state: expanded
      clusters:
        query: overview.clusters
        tags:
        - Cluster
        - Configuration
        state: expanded
      changed_settings:
        query: configuration.changed_settings
        tags:
        - Configuration
        state: expanded
  operating_system:
