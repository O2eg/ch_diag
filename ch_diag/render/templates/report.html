      return provenance;
    }

    function resolvedRawItemConfiguration(item, itemDefinition, sourceKind, sourceId, sourceRoot) {
      const metadata = item.source_metadata;
      const sourceManifest = contentDocument[sourceRoot][sourceId];
      const resolved = {
        item_id: item.item_id,
        title: item.title,
        source_kind: sourceKind,
        source_id: sourceId,
        state: item.state,
        tags: itemDefinition.tags,
        collection_scope: item.collection_scope,
      };
      for (const key of ["execution_scope", "variant_id", "sql_file"]) {
        if (metadata[key] !== undefined && metadata[key] !== null) {
          resolved[key] = metadata[key];
        }
      }
      if (itemDefinition.render !== undefined) {
        resolved.render = itemDefinition.render;
      }
      if (sourceManifest.display !== undefined) {
        resolved.display = sourceManifest.display;
      }
      return Object.fromEntries(
        Object.entries(resolved).filter((entry) => entry[1] !== undefined && entry[1] !== null && entry[1] !== "")
      );
    }

    function uniqueSourcesForPaths(paths) {
      const sources = [];
      const seen = new Set();
      for (const path of paths) {
        for (const source of sourceFilesForPath(path.split("/"), contentProvenance)) {
          if (!seen.has(source)) {
            seen.add(source);
            sources.push(source);
          }
        }
      }
      return sources;
    }

    function renderAnnotatedYaml(documentValue, provenance) {
      const lines = [];
      appendAnnotatedYamlMapping(lines, documentValue, [], 0, provenance);
      return lines.join("\n") + "\n";
    }

    function appendAnnotatedYamlMapping(lines, value, path, indent, provenance) {
      for (const [key, child] of Object.entries(value)) {
        const childPath = path.concat(String(key));
        appendAnnotatedYamlComment(lines, childPath, indent, provenance);
        const prefix = " ".repeat(indent) + yamlKey(key) + ":";
        if (Array.isArray(child)) {
          if (!child.length) {
            lines.push(prefix + " []");
          } else {
            lines.push(prefix);
            appendAnnotatedYamlList(lines, child, childPath, indent + 2, provenance);
          }
        } else if (child && typeof child === "object") {
          if (!Object.keys(child).length) {
            lines.push(prefix + " {}");
          } else {
            lines.push(prefix);
            appendAnnotatedYamlMapping(lines, child, childPath, indent + 2, provenance);
          }
        } else {
          lines.push(prefix + " " + yamlScalar(child));
        }
      }
    }

    function appendAnnotatedYamlList(lines, values, path, indent, provenance) {
      const itemPath = path.slice();
      itemPath[itemPath.length - 1] += "[]";
      for (const value of values) {
        appendAnnotatedYamlComment(lines, itemPath, indent, provenance);
        const prefix = " ".repeat(indent) + "-";
        if (Array.isArray(value)) {
          if (!value.length) {
            lines.push(prefix + " []");
          } else {
            lines.push(prefix);
            appendAnnotatedYamlList(lines, value, itemPath, indent + 2, provenance);
          }
        } else if (value && typeof value === "object") {
          if (!Object.keys(value).length) {
            lines.push(prefix + " {}");
          } else {
            lines.push(prefix);
            appendAnnotatedYamlMapping(lines, value, itemPath, indent + 2, provenance);
          }
        } else {
          lines.push(prefix + " " + yamlScalar(value));
        }
      }
    }

    function appendAnnotatedYamlComment(lines, path, indent, provenance) {
      const description = fieldDescriptionForPath(path);
      const sources = sourceFilesForPath(path, provenance);
      const sourceText = sources.length
        ? " Source" + (sources.length > 1 ? "s" : "") + ": " + sources.join(", ") + "."
        : "";
      const comment = description + sourceText;
      const width = Math.max(56, 112 - indent);
      for (const line of wrapComment(comment, width)) {
        lines.push(" ".repeat(indent) + "# " + line);
      }
    }

    function fieldDescriptionForPath(path) {
      const pathText = path.join("/");
      if (contentFieldReference[pathText]) {
        return String(contentFieldReference[pathText]);
      }
      let bestDescription = "";
      let bestSpecificity = -1;
      for (const [pattern, description] of Object.entries(contentFieldReference)) {
        if (pattern === "*") {
          continue;
        }
        const patternParts = pattern.split("/");
        if (patternParts.length !== path.length) {
          continue;
        }
        let matches = true;
        let specificity = 0;
        for (let index = 0; index < patternParts.length; index += 1) {
          if (patternParts[index] === "*") {
            continue;
          }
          if (patternParts[index] !== path[index]) {
            matches = false;
            break;
          }
          specificity += 1;
        }
        if (matches && specificity > bestSpecificity) {
          bestDescription = String(description);
          bestSpecificity = specificity;
        }
      }
      if (bestDescription) {
        return bestDescription;
      }
      return "Configuration field " + pathText + ".";
    }

    function sourceFilesForPath(path, provenance) {
      for (let length = path.length; length > 0; length -= 1) {
        const candidate = path.slice(0, length).join("/");
        const sources = provenance[candidate];
        if (Array.isArray(sources) && sources.length) {
          return sources.map((source) => String(source));
        }
      }
      return [];
    }

    function wrapComment(value, width) {
      const words = String(value || "").replace(/\s+/g, " ").trim().split(" ").filter(Boolean);
      const lines = [];
      let line = "";
      for (const word of words) {
        if (line && line.length + word.length + 1 > width) {
          lines.push(line);
          line = word;
        } else {
          line = line ? line + " " + word : word;
        }
      }
      if (line) {
        lines.push(line);
      }
      return lines.length ? lines : [""];
    }

    function yamlKey(value) {
      const text = String(value);
      return /^[A-Za-z_][A-Za-z0-9_.-]*$/.test(text) ? text : JSON.stringify(text);
    }

    function yamlScalar(value) {
      if (value === undefined || value === null) {
        return "null";
      }
      if (typeof value === "boolean" || typeof value === "number") {
        return String(value);
      }
      return JSON.stringify(String(value));
    }

    function renderMetaTable(rows) {
      const table = document.createElement("table");
      table.className = "meta-table";
      const tbody = document.createElement("tbody");
      for (const row of rows) {
        const tr = document.createElement("tr");
        const key = document.createElement("th");
        key.scope = "row";
        key.textContent = row.key;
        const value = document.createElement("td");
        if (row.multiline) {
          const pre = document.createElement("pre");
          pre.textContent = row.value;
          value.appendChild(pre);
        } else {
          value.textContent = row.value;
        }
        tr.appendChild(key);
        tr.appendChild(value);
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      return table;
    }

    function itemMetaRows(item) {
      const rows = [];
      appendMetaValue(rows, "item_id", item.item_id);
      appendMetaValue(rows, "section_id", item.section_id);
      appendMetaValue(rows, "title", item.title);
      appendMetaValue(rows, "source_kind", item.source_kind);
      appendMetaValue(rows, "collection_status", collectionStatus(item));
      appendMetaValue(rows, "severity_level", itemSeverityLevel(item));
      appendMetaValue(rows, "state", item.state);
      appendMetaValue(rows, "reason", item.reason);
      appendMetaValue(rows, "collected_at", item.collected_at);
      appendMetaValue(rows, "timing_ms", item.timing_ms);

      const result = item.result || {};
      appendMetaValue(rows, "result.kind", result.kind);
      if (result.kind === "table") {
        appendMetaValue(rows, "result.row_count", result.row_count == null ? (result.rows || []).length : result.row_count);
        appendMetaValue(rows, "result.column_count", (result.columns || []).length);
      } else if (result.kind === "chart") {
        appendMetaValue(rows, "result.sample_count", result.sample_count);
        appendMetaValue(rows, "result.series_count", (result.series || []).length);
        appendMetaRows(rows, "result.chart", result.chart || {});
      }
      if (result.interval_coverage) {
        appendMetaValue(rows, "result.interval_coverage", result.interval_coverage, true);
      }

      appendMetaRows(rows, "source", item.source_metadata || {});
      const sourceText = sourceTextFromMeta(item.source_metadata || {});
      if (sourceText) {
        appendMetaValue(rows, "source.source_text_chars", sourceText.length);
      }
      const instructionsText = instructionTextFromMeta(item.source_metadata || {});
      if (instructionsText) {
        appendMetaValue(rows, "source.instructions.text_chars", instructionsText.length);
      }
      if ((item.diagnostics || []).length) {
        appendMetaValue(rows, "diagnostics", item.diagnostics, true);
      }
      if (item.issues && Object.keys(item.issues).length) {
        appendMetaValue(rows, "issues", item.issues, true);
      }
      return rows;
    }

    function appendMetaRows(rows, prefix, value) {
      if (!value || typeof value !== "object") {
        appendMetaValue(rows, prefix, value);
        return;
      }
      if (Array.isArray(value)) {
        appendMetaValue(rows, prefix, value, true);
        return;
      }
      for (const key of Object.keys(value).sort()) {
        const childKey = prefix + "." + key;
        if (key === "source_text" || childKey === "source.instructions.text") {
          continue;
        }
        const child = value[key];
        if (child && typeof child === "object" && !Array.isArray(child)) {
          appendMetaRows(rows, childKey, child);
        } else {
          appendMetaValue(rows, childKey, child, Array.isArray(child));
        }
      }
    }

    function appendMetaValue(rows, key, value, forceMultiline) {
      if (value === undefined || value === null || value === "") {
        return;
      }
      let text;
      let multiline = Boolean(forceMultiline);
      if (typeof value === "object") {
        text = stringifyValue(value);
        multiline = true;
      } else {
        text = String(value);
      }
      rows.push({key, value: text, multiline});
    }

    function sourceTextFromMeta(source) {
      return String((source || {}).source_text || "");
    }

    const PgDiagMarkdown = (() => {
      function render(markdown) {
        const root = document.createElement("div");
        root.className = "markdown-body";
        const lines = String(markdown || "").replace(/\r\n?/g, "\n").split("\n");
        let index = 0;
        while (index < lines.length) {
          const line = lines[index];
          if (!line.trim()) {
            index += 1;
            continue;
          }
          if (line.startsWith("```")) {
            const language = line.slice(3).trim();
            const codeLines = [];
            index += 1;
            while (index < lines.length && !lines[index].startsWith("```")) {
              codeLines.push(lines[index]);
              index += 1;
            }
            if (index < lines.length) {
              index += 1;
            }
            root.appendChild(renderCodeBlock(codeLines.join("\n"), language));
            continue;
          }
          const heading = /^(#{1,3})\s+(.+)$/.exec(line);
          if (heading) {
            root.appendChild(renderHeading(heading[1].length, heading[2]));
            index += 1;
            continue;
          }
          if (/^\s*[-*]\s+/.test(line)) {
            const list = document.createElement("ul");
            while (index < lines.length && /^\s*[-*]\s+/.test(lines[index])) {
              list.appendChild(renderListItem(lines[index].replace(/^\s*[-*]\s+/, "")));
              index += 1;
            }
            root.appendChild(list);
            continue;
          }
          if (/^\s*\d+\.\s+/.test(line)) {
            const list = document.createElement("ol");
            while (index < lines.length && /^\s*\d+\.\s+/.test(lines[index])) {
              list.appendChild(renderListItem(lines[index].replace(/^\s*\d+\.\s+/, "")));
              index += 1;
            }
            root.appendChild(list);
            continue;
          }
          if (/^\s*>\s?/.test(line)) {
            const block = document.createElement("blockquote");
            const parts = [];
            while (index < lines.length && /^\s*>\s?/.test(lines[index])) {
              parts.push(lines[index].replace(/^\s*>\s?/, ""));
              index += 1;
            }
            block.appendChild(renderInline(parts.join(" ")));
            root.appendChild(block);
            continue;
          }
          const parts = [line.trim()];
          index += 1;
          while (
            index < lines.length &&
            lines[index].trim() &&
            !lines[index].startsWith("```") &&
            !/^(#{1,3})\s+/.test(lines[index]) &&
            !/^\s*[-*]\s+/.test(lines[index]) &&
            !/^\s*\d+\.\s+/.test(lines[index]) &&
            !/^\s*>\s?/.test(lines[index])
          ) {
            parts.push(lines[index].trim());
            index += 1;
          }
          const paragraph = document.createElement("p");
          paragraph.appendChild(renderInline(parts.join(" ")));
          root.appendChild(paragraph);
        }
        return root;
      }

      function renderHeading(level, text) {
        const heading = document.createElement("h" + level);
        heading.appendChild(renderInline(text));
        return heading;
      }

      function renderListItem(text) {
        const item = document.createElement("li");
        item.appendChild(renderInline(text));
        return item;
      }

      function renderCodeBlock(text, language) {
        const pre = document.createElement("pre");
        const code = document.createElement("code");
        if (language) {
          code.className = "language-" + language;
        }
        code.textContent = text;
        pre.appendChild(code);
        return pre;
      }

      function renderInline(text) {
        const fragment = document.createDocumentFragment();
        const pattern = /(`[^`]+`|\*\*[^*]+\*\*)/g;
        let lastIndex = 0;
        let match;
        while ((match = pattern.exec(text)) !== null) {
          appendText(fragment, text.slice(lastIndex, match.index));
          const token = match[0];
          if (token.startsWith("`")) {
            const code = document.createElement("code");
            code.textContent = token.slice(1, -1);
            fragment.appendChild(code);
          } else if (token.startsWith("**")) {
            const strong = document.createElement("strong");
            strong.textContent = token.slice(2, -2);
            fragment.appendChild(strong);
          }
          lastIndex = match.index + token.length;
        }
        appendText(fragment, text.slice(lastIndex));
        return fragment;
      }

      function appendText(parent, text) {
        if (text) {
          parent.appendChild(document.createTextNode(text));
        }
      }

      return {render};
    })();

    function closeSourceModal() {
      const modal = document.getElementById("sourceModal");
      hideReportModal(modal);
      currentSourceText = "";
      const copyButton = document.getElementById("copySource");
      copyButton.textContent = "Copy";
    }

    async function copyCurrentSource() {
      if (!currentSourceText) {
        return;
      }
      if (!navigator.clipboard || typeof navigator.clipboard.writeText !== "function") {
        flashCopyButton("Unavailable");
        return;
      }
      try {
        await navigator.clipboard.writeText(currentSourceText);
        flashCopyButton("Copied");
      } catch (error) {
        flashCopyButton("Copy failed");
      }
    }

    function flashCopyButton(text) {
      const button = document.getElementById("copySource");
      button.textContent = text;
      window.setTimeout(() => {
        button.textContent = "Copy";
      }, 1200);
    }

    function isErrorItem(item) {
      return ERROR_ITEM_STATUSES.has(collectionStatus(item));
    }

    function renderItemError(item) {
      const box = document.createElement("div");
      box.className = "item-error";

      const title = document.createElement("p");
      title.className = "item-error-title";
      title.textContent = "Execution error";
      box.appendChild(title);

      if (item.reason) {
        const message = document.createElement("p");
        message.className = "item-error-message";
        setHighlightableText(message, item.reason);
        box.appendChild(message);
      }

      const detailsText = itemErrorDetailsText(item);
      if (detailsText) {
        const pre = document.createElement("pre");
        pre.className = "item-error-details";
        setHighlightableText(pre, detailsText);
        box.appendChild(pre);
      }

      return box;
    }

    function itemErrorDetailsText(item) {
      const parts = [];
      parts.push("collection_status: " + collectionStatus(item));
      if (item.reason) {
        parts.push("reason: " + item.reason);
      }

      (item.diagnostics || []).forEach((diagnostic, index) => {
        if (!diagnostic || typeof diagnostic !== "object") {
          parts.push("diagnostic[" + index + "]: " + stringifyValue(diagnostic));
          return;
        }
        const header = [
          diagnostic.level ? "level=" + diagnostic.level : "",
          diagnostic.code ? "code=" + diagnostic.code : "",
          diagnostic.message ? "message=" + diagnostic.message : "",
        ].filter(Boolean).join(" ");
        const diagnosticParts = [];
        if (header) {
          diagnosticParts.push(header);
        }
        ["exit_code", "stderr", "stdout", "traceback", "output"].forEach((key) => {
          const value = diagnostic[key];
          if (value !== undefined && value !== null && String(value) !== "") {
            diagnosticParts.push(key + ":\n" + stringifyValue(value));
          }
        });
        if (!diagnosticParts.length) {
          diagnosticParts.push(stringifyValue(diagnostic));
        }
        parts.push("diagnostic[" + index + "]:\n" + diagnosticParts.join("\n\n"));
      });

      const result = item.result || {};
      if (result.kind === "plain_text" && result.data) {
        parts.push("output:\n" + stringifyValue(result.data));
      }
      return parts.join("\n\n").trim();
    }

    function renderResult(item) {
      const result = item.result || {kind: "none"};
      if (shouldRenderReasonAsResult(item)) {
        return renderReasonResult(item);
      }
      if (result.kind === "table") {
        return renderTable(result, item);
      }
      if (result.kind === "chart") {
        return renderChart(result, item);
      }
      if (result.kind === "none") {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = itemEmptyMessage(
          item,
          collectionStatus(item) === "ok" ? "No result payload" : "No data"
        );
        return empty;
      }
      return renderPlainTextResult(result.data == null ? "" : stringifyValue(result.data));
    }

    function shouldRenderReasonAsResult(item) {
      const status = collectionStatus(item);
      const sourceKind = String(item.source_kind || "").toLowerCase();
      return Boolean(
        item
        && item.reason
        && !isErrorItem(item)
        && (status === "unsupported" || (status !== "ok" && sourceKind === "python"))
      );
    }

    function renderReasonResult(item) {
      if (collectionStatus(item) !== "unsupported") {
        return renderPlainTextResult(item.reason);
      }
      const box = document.createElement("div");
      box.className = "item-error";
      const message = document.createElement("p");
      message.className = "item-error-message";
      setHighlightableText(message, item.reason);
      box.appendChild(message);
      return box;
    }

    function renderPlainTextResult(text) {
      const pre = document.createElement("pre");
      pre.className = "plain";
      setHighlightableText(pre, text == null ? "" : String(text));
      return pre;
    }

    function renderChart(result, item) {
      const series = echartsSeries(result);
      if (!series.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = itemEmptyMessage(item, "No chart data");
        return empty;
      }

      const shell = document.createElement("div");
      shell.className = "chart-shell";
      const container = document.createElement("div");
      container.className = "echarts-chart";
      container.id = "echarts_chart_" + pendingCharts.length;
      shell.appendChild(container);
      pendingCharts.push({shell, container, result, item, series});
      return shell;
    }

    function renderPendingCharts() {
      for (const pending of pendingCharts) {
        if (!window.echarts) {
          pending.container.textContent = "Apache ECharts is unavailable";
          continue;
        }
        enableChartTooltipScrolling(pending.shell);
        const chart = window.echarts.init(pending.container, null, {renderer: "svg"});
        const entry = {
          chart,
          shell: pending.shell,
          container: pending.container,
          result: pending.result,
          item: pending.item,
          series: pending.series,
          zoomRange: {start: 0, end: 100},
          panEnabled: false,
          panDrag: null,
          legendPanel: null,
          exportMenu: null,
        };
        echartsCharts.push(entry);
        chart.on("datazoom", (event) => rememberEChartsZoom(entry, event));
        chart.setOption(buildEChartsOptions(entry), {notMerge: true});
        chart.resize();
        bindEChartsPan(entry);
        entry.legendPanel = createEChartsLegendPanel(entry);
        pending.shell.appendChild(entry.legendPanel);
        entry.exportMenu = createEChartsExportMenu(entry);
        pending.shell.appendChild(entry.exportMenu);
        pending.container.dataset.chartReady = "true";
      }
    }

    function enableChartTooltipScrolling(container) {
      container.addEventListener("wheel", (event) => {
        const target = event.target instanceof Element ? event.target : null;
        const rows = target ? target.closest(".ch-diag-chart-tooltip-rows") : null;
        if (!rows) {
          return;
        }
        const scale = event.deltaMode === 1
          ? 16
          : event.deltaMode === 2
            ? rows.clientHeight
            : 1;
        const maximum = Math.max(rows.scrollHeight - rows.clientHeight, 0);
        const next = Math.min(Math.max(rows.scrollTop + event.deltaY * scale, 0), maximum);
        if (next === rows.scrollTop) {
          return;
        }
        rows.scrollTop = next;
        event.preventDefault();
        event.stopImmediatePropagation();
      }, {capture: true, passive: false});
    }

    function echartsSeries(result) {
      const xType = (result.chart || {}).x_type || "datetime";
      const chartKind = (result.chart || {}).kind || "line";
      const largestStackSeriesOnTop = chartKind === "stacked_column" || chartKind === "stacked_bar";
      const xGrid = chartXGrid(result.series || [], xType);
      const series = (result.series || [])
        .map((entry, sourceIndex) => {
          const valuesByX = new Map();
          for (const point of entry.points || []) {
            const coordinate = chartPointCoordinate(point, xType);
            if (!coordinate) {
              continue;
            }
            const numeric = point.value === null || point.value === undefined
              ? null
              : Number(point.value);
            valuesByX.set(coordinate.key, Number.isFinite(numeric) ? numeric : null);
          }
          const data = xGrid.map((coordinate) => ({
            x: coordinate.value,
            y: valuesByX.has(coordinate.key) ? valuesByX.get(coordinate.key) : null,
          }));
          const finiteValues = data.map((point) => point.y).filter((value) => Number.isFinite(value));
          const total = finiteValues.reduce((sum, value) => sum + value, 0);
          const average = finiteValues.length ? total / finiteValues.length : Number.NEGATIVE_INFINITY;
          return {name: entry.name, unit: entry.unit, _color: entry.color || "", _sourceIndex: sourceIndex, _average: average, data};
        })
        .filter((entry) => entry.data.some((point) => Number.isFinite(point.y)))
        .filter((entry) => entry.data.some((point) => Number.isFinite(point.y) && point.y !== 0));
      if ((result.chart || {}).series_order === "configured") {
        return series;
      }
      if (largestStackSeriesOnTop) {
        return series.sort((left, right) => left._average - right._average || left._sourceIndex - right._sourceIndex);
      }
      return series.sort((left, right) => right._average - left._average || left._sourceIndex - right._sourceIndex);
    }

    function chartXGrid(series, xType) {
      const coordinates = new Map();
      for (const entry of series || []) {
        for (const point of entry.points || []) {
          const coordinate = chartPointCoordinate(point, xType);
          if (!coordinate) {
            continue;
          }
          const stored = coordinates.get(coordinate.key) || {
            ...coordinate,
            hasFiniteValue: false,
          };
          const numeric = point.value === null || point.value === undefined
            ? null
            : Number(point.value);
          stored.hasFiniteValue = stored.hasFiniteValue || Number.isFinite(numeric);
          coordinates.set(coordinate.key, stored);
        }
      }
      const grid = [...coordinates.values()];
      if (xType === "datetime") {
        grid.sort((left, right) => left.sortValue - right.sortValue);
      }
      const firstFinite = grid.findIndex((coordinate) => coordinate.hasFiniteValue);
      if (firstFinite < 0) {
        return [];
      }
      let lastFinite = grid.length - 1;
      while (lastFinite > firstFinite && !grid[lastFinite].hasFiniteValue) {
        lastFinite -= 1;
      }
      return grid.slice(firstFinite, lastFinite + 1);
    }

    function chartPointCoordinate(point, xType) {
      if (!point || typeof point !== "object") {
        return null;
      }
      if (xType === "datetime") {
        const timestamp = Date.parse(point.t);
        return Number.isFinite(timestamp)
          ? {key: String(timestamp), value: point.t, sortValue: timestamp}
          : null;
      }
      const value = String(point.x || point.t || "");
      return {key: value, value, sortValue: 0};
    }

    function buildEChartsOptions(entry, themeOverride = null, exporting = false) {
      const result = entry.result;
      const item = entry.item;
      const series = entry.series;
      const unit = chartUnit(result, series);
      const theme = themeOverride || echartsThemeOptions();
      const chartKind = (result.chart || {}).kind || "line";
      const seriesType = echartsChartType(chartKind);
      const stacked = chartKind === "stacked_bar" || chartKind === "stacked_column" || chartKind === "stacked_area";
      const isBar = seriesType === "bar";
      const isArea = chartKind === "area" || chartKind === "stacked_area";
      const axisScale = chartAxisScale(series, unit, (result.chart || {}).quantity, stacked);
      const isPercent = unit === "percent" || unit === "%";
      const xType = (result.chart || {}).x_type || "datetime";
      const datetimeBounds = xType === "datetime" ? chartDatetimeBounds(series) : {};
      const colors = chartColors(series);
      const categoryValues = series.length ? series[0].data.map((point) => point.x) : [];
      const zoomRange = entry.zoomRange || {start: 0, end: 100};
      const legendData = eChartsLegendData(series, chartKind);
      const legendLayout = eChartsLegendLayout(entry, legendData);

      const renderedSeries = series.map((source, seriesIndex) => {
        const color = colors[seriesIndex];
        const data = source.data.map((point) => {
          if (xType === "datetime") {
            return [Date.parse(point.x), point.y];
          }
          return point.y;
        });
        return {
          name: source.name,
          type: seriesType,
          stack: stacked ? "ch_diag_stack" : undefined,
          data,
          smooth: !isBar,
          showSymbol: false,
          connectNulls: false,
          barMaxWidth: 48,
          itemStyle: {
            color,
            borderRadius: isBar ? [2, 2, 0, 0] : 0,
            opacity: isArea && !stacked ? 0.9 : 1,
          },
          lineStyle: {color, width: isArea ? 1 : 2},
          areaStyle: isArea ? {color, opacity: stacked ? 0.82 : 0.24} : undefined,
          emphasis: {focus: "series"},
        };
      });

      return {
        animation: !exporting,
        animationDuration: 220,
        backgroundColor: theme.chartBackground || "transparent",
        color: colors,
        title: {
          text: chartTitle(item.title || "", axisScale.label),
          left: 16,
          top: 12,
          textStyle: {color: theme.text, fontSize: 15, fontWeight: 700},
        },
        grid: {
          left: 18,
          right: 26,
          top: 68,
          bottom: exporting ? legendLayout.height + 24 : 44,
          containLabel: true,
        },
        legend: {
          show: exporting,
          type: "plain",
          data: legendData,
          left: 18,
          width: legendLayout.width,
          bottom: 8,
          height: legendLayout.height,
          orient: "horizontal",
          formatter: (seriesName) => chartSeriesLabel(seriesName),
          textStyle: {color: theme.text, fontSize: 12},
          itemWidth: 20,
          itemHeight: 10,
          itemGap: 14,
          selectedMode: true,
        },
        toolbox: {
          show: !exporting,
          right: 14,
          top: 10,
          itemSize: 17,
          itemGap: 9,
          iconStyle: {borderColor: theme.muted, borderWidth: 1.5},
          emphasis: {iconStyle: {borderColor: theme.accent, borderWidth: 2}},
          feature: {
            dataZoom: {
              title: {zoom: "Select zoom", back: "Undo zoom"},
              xAxisIndex: [0],
              yAxisIndex: "none",
            },
            myPan: {
              show: true,
              title: entry.panEnabled
                ? "Pan mode enabled - drag horizontally"
                : "Pan by dragging",
              icon: "path://M5 11V8a1.5 1.5 0 0 1 3 0v2-4a1.5 1.5 0 0 1 3 0v4-5a1.5 1.5 0 0 1 3 0v5-3a1.5 1.5 0 0 1 3 0v7c0 4-2.5 7-7 7H9c-2.5 0-4-1-5.5-3L1 14a1.5 1.5 0 0 1 2.5-1.7L5 14z",
              iconStyle: {
                borderColor: entry.panEnabled ? theme.accent : theme.muted,
                borderWidth: entry.panEnabled ? 2 : 1.5,
              },
              onclick: () => enableEChartsPan(entry),
            },
            myZoomIn: {
              show: true,
              title: "Zoom in",
              icon: "path://M10 3a7 7 0 1 0 0 14a7 7 0 1 0 0-14M15 15l6 6M10 6v8M6 10h8",
              onclick: () => zoomEChart(entry, 0.5),
            },
            myZoomOut: {
              show: true,
              title: "Zoom out",
              icon: "path://M10 3a7 7 0 1 0 0 14a7 7 0 1 0 0-14M15 15l6 6M6 10h8",
              onclick: () => zoomEChart(entry, 2),
            },
            restore: {show: true, title: "Reset zoom"},
            myExport: {
              show: true,
              title: "Export",
              icon: "path://M2 8h7V2h6v6h7L12 20z",
              onclick: () => toggleEChartsExportMenu(entry),
            },
          },
        },
        tooltip: {
          show: !exporting,
          trigger: "axis",
          renderMode: "html",
          className: "ch-diag-echarts-tooltip",
          confine: true,
          enterable: true,
          hideDelay: 120,
          backgroundColor: theme.panel,
          borderColor: theme.line,
          borderWidth: 1,
          padding: 0,
          textStyle: {color: theme.text},
          axisPointer: {
            type: isBar ? "shadow" : "cross",
            lineStyle: {color: theme.muted},
            crossStyle: {color: theme.muted},
            label: {backgroundColor: theme.panelSoft, color: theme.text},
          },
          formatter: (params) => buildSortedEChartsTooltip(
            params,
            unit,
            xType,
            axisScale,
          ),
        },
        dataZoom: [{
          type: "inside",
          xAxisIndex: 0,
          start: zoomRange.start,
          end: zoomRange.end,
          filterMode: "filter",
          zoomOnMouseWheel: false,
          moveOnMouseWheel: false,
          moveOnMouseMove: false,
          preventDefaultMouseMove: true,
        }],
        xAxis: {
          type: xType === "datetime" ? "time" : "category",
          data: xType === "datetime" ? undefined : categoryValues,
          min: datetimeBounds.min,
          max: datetimeBounds.max,
          boundaryGap: isBar,
          axisLabel: {
            color: theme.muted,
            rotate: xType === "datetime" ? 0 : 35,
            hideOverlap: true,
            formatter: xType === "datetime" ? (value) => formatChartTimeCoordinate(value) : undefined,
          },
          axisLine: {lineStyle: {color: theme.line}},
          axisTick: {lineStyle: {color: theme.line}},
          splitLine: {show: false},
          axisPointer: {
            label: {
              backgroundColor: theme.panelSoft,
              color: theme.text,
              formatter: (params) => xType === "datetime"
                ? formatChartTimeCoordinate(params.value)
                : String(params.value == null ? "" : params.value),
            },
          },
        },
        yAxis: {
          type: "value",
          min: isPercent ? 0 : undefined,
          max: isPercent ? 100 : undefined,
          axisLabel: {
            color: theme.muted,
            formatter: (value) => formatChartAxisValue(value, unit, axisScale),
          },
          axisLine: {show: false},
          axisTick: {show: false},
          splitLine: {lineStyle: {color: theme.line, opacity: 0.65}},
          axisPointer: {
            label: {
              backgroundColor: theme.panelSoft,
              color: theme.text,
              formatter: (params) => formatChartAxisValue(params.value, unit, axisScale),
            },
          },
        },
        series: renderedSeries,
      };
    }

    function eChartsLegendData(series, chartKind) {
      const names = series.map((source) => source.name);
      return chartKind === "stacked_column" || chartKind === "stacked_bar"
        ? names.reverse()
        : names;
    }

    function eChartsLegendLayout(entry, legendData) {
      const containerWidth = Math.max(
        Number(entry.container.clientWidth) || Number(entry.shell.clientWidth) || 0,
        640,
      );
      const width = Math.max(containerWidth - 36, 320);
      let rows = 1;
      let occupied = 0;
      for (const seriesName of legendData) {
        const label = chartSeriesLabel(seriesName);
        const estimatedWidth = Math.min(width, 48 + Array.from(label).length * 7);
        if (occupied > 0 && occupied + estimatedWidth > width) {
          rows += 1;
          occupied = 0;
        }
        occupied += estimatedWidth;
      }
      const height = CHART_LEGEND_PADDING_PX + rows * CHART_LEGEND_ROW_HEIGHT_PX;
      const chartHeight = Math.max(
        CHART_MIN_HEIGHT_PX,
        68 + CHART_PLOT_MIN_HEIGHT_PX + height + 24,
      );
      return {chartHeight, height, width};
    }

    function createEChartsLegendPanel(entry) {
      const panel = document.createElement("div");
      panel.className = "chart-legend-panel";
      panel.setAttribute("role", "group");
      panel.setAttribute("aria-label", "Chart series");
      panel.style.maxHeight = (
        CHART_LEGEND_MAX_VISIBLE_ROWS * CHART_LEGEND_ROW_HEIGHT_PX
        + CHART_LEGEND_PADDING_PX
      ) + "px";
      const colors = chartColors(entry.series);
      const colorByName = new Map(
        entry.series.map((source, index) => [source.name, colors[index]]),
      );
      const chartKind = (entry.result.chart || {}).kind || "line";
      for (const seriesName of eChartsLegendData(entry.series, chartKind)) {
        const labelText = chartSeriesLabel(seriesName);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chart-legend-item";
        button.setAttribute("aria-pressed", "true");
        button.title = labelText;
        button.__seriesName = seriesName;

        const marker = document.createElement("span");
        marker.className = "chart-legend-marker";
        marker.style.background = safeChartColor(colorByName.get(seriesName));
        button.appendChild(marker);

        const label = document.createElement("span");
        label.className = "chart-legend-label";
        label.textContent = labelText;
        button.appendChild(label);

        button.addEventListener("click", () => {
          entry.chart.dispatchAction({type: "legendToggleSelect", name: seriesName});
        });
        panel.appendChild(button);
      }
      entry.chart.on("legendselectchanged", (event) => {
        updateEChartsLegendPanel(entry, event.selected || {});
      });
      return panel;
    }

    function updateEChartsLegendPanel(entry, selected) {
      if (!entry.legendPanel) {
        return;
      }
      for (const button of entry.legendPanel.querySelectorAll(".chart-legend-item")) {
        const enabled = selected[button.__seriesName] !== false;
        button.setAttribute("aria-pressed", enabled ? "true" : "false");
      }
    }

    function rememberEChartsZoom(entry, event) {
      const payload = event && Array.isArray(event.batch) ? event.batch[0] : event;
      const start = Number(payload && payload.start);
      const end = Number(payload && payload.end);
      if (Number.isFinite(start) && Number.isFinite(end)) {
        entry.zoomRange = {start, end};
      }
    }

    function bindEChartsPan(entry) {
      entry.container.addEventListener("pointerdown", (event) => {
        const range = entry.zoomRange || {start: 0, end: 100};
        const span = range.end - range.start;
        const bounds = entry.container.getBoundingClientRect();
        const localPoint = [event.clientX - bounds.left, event.clientY - bounds.top];
        if (
          !entry.panEnabled
          || event.button !== 0
          || span >= 99.999
          || !entry.chart.containPixel({gridIndex: 0}, localPoint)
        ) {
          return;
        }
        entry.panDrag = {
          startX: event.clientX,
          width: Math.max(bounds.width, 1),
          range: {start: range.start, end: range.end},
        };
        activeEChartsPanEntry = entry;
        window.addEventListener(
          "pointermove",
          moveEChartsPan,
          {capture: true, passive: false},
        );
        window.addEventListener(
          "pointerup",
          finishActiveEChartsPan,
          {capture: true, once: true},
        );
        entry.container.style.cursor = "grabbing";
        event.preventDefault();
        event.stopPropagation();
      }, {capture: true});
    }

    function moveEChartsPan(event) {
      const entry = activeEChartsPanEntry;
      const drag = entry && entry.panDrag;
      if (!entry || !entry.panEnabled || !drag) {
        return;
      }
      const span = drag.range.end - drag.range.start;
      const shift = ((event.clientX - drag.startX) / drag.width) * span;
      const start = Math.max(0, Math.min(100 - span, drag.range.start - shift));
      const end = start + span;
      entry.zoomRange = {start, end};
      entry.chart.dispatchAction({type: "dataZoom", dataZoomIndex: 0, start, end});
      event.preventDefault();
    }

    function finishActiveEChartsPan() {
      if (activeEChartsPanEntry) {
        finishEChartsPanDrag(activeEChartsPanEntry);
      }
    }

    function finishEChartsPanDrag(entry) {
      window.removeEventListener("pointermove", moveEChartsPan, true);
      window.removeEventListener("pointerup", finishActiveEChartsPan, true);
      activeEChartsPanEntry = null;
      entry.panDrag = null;
      entry.container.style.cursor = entry.panEnabled ? "grab" : "default";
    }

    function enableEChartsPan(entry) {
      entry.panEnabled = !entry.panEnabled;
      finishEChartsPanDrag(entry);
      entry.chart.dispatchAction({
        type: "takeGlobalCursor",
        key: "dataZoomSelect",
        dataZoomSelectActive: false,
      });
      const range = entry.zoomRange || {start: 0, end: 100};
      if (entry.panEnabled && range.end - range.start >= 99.999) {
        zoomEChart(entry, 0.8);
      }
      const theme = echartsThemeOptions();
      entry.chart.setOption({
        toolbox: {
          feature: {
            myPan: {
              title: entry.panEnabled
                ? "Pan mode enabled - drag horizontally"
                : "Pan by dragging",
              iconStyle: {
                borderColor: entry.panEnabled ? theme.accent : theme.muted,
                borderWidth: entry.panEnabled ? 2 : 1.5,
              },
            },
          },
        },
      });
    }

    function zoomEChart(entry, multiplier) {
      const range = entry.zoomRange || {start: 0, end: 100};
      const center = (range.start + range.end) / 2;
      const span = Math.min(100, Math.max(0.5, (range.end - range.start) * multiplier));
      const start = Math.max(0, Math.min(100 - span, center - span / 2));
      const end = start + span;
      entry.zoomRange = {start, end};
      entry.chart.dispatchAction({type: "dataZoom", dataZoomIndex: 0, start, end});
    }

    function chartExportFileName(item) {
      const raw = String((item || {}).item_id || (item || {}).title || "ch_diag_chart");
      const normalized = raw.replace(/[^a-z0-9._-]+/gi, "_").replace(/^_+|_+$/g, "");
      return normalized || "ch_diag_chart";
    }

    function createEChartsExportMenu(entry) {
      const menu = document.createElement("div");
      menu.className = "chart-export-menu";
      menu.setAttribute("role", "menu");
      menu.setAttribute("aria-label", "Export chart");
      menu.hidden = true;
      for (const format of ["svg", "png", "csv"]) {
        const button = document.createElement("button");
        button.type = "button";
        button.setAttribute("role", "menuitem");
        button.dataset.exportFormat = format;
        button.textContent = "Export " + format.toUpperCase();
        button.addEventListener("click", () => {
          menu.hidden = true;
          if (format === "csv") {
            downloadEChartsCsv(entry);
          } else {
            downloadEChartsImage(entry, format);
          }
        });
        menu.appendChild(button);
      }
      return menu;
    }

    function toggleEChartsExportMenu(entry) {
      for (const candidate of echartsCharts) {
        if (candidate !== entry && candidate.exportMenu) {
          candidate.exportMenu.hidden = true;
        }
      }
      entry.exportMenu.hidden = !entry.exportMenu.hidden;
      if (!entry.exportMenu.hidden) {
        entry.exportMenu.querySelector("button").focus({preventScroll: true});
      }
    }

    function downloadEChartsImage(entry, format) {
      if (format !== "svg" && format !== "png") {
        return;
      }
      const width = Math.max(Math.round(entry.container.clientWidth), 640);
      const chartKind = (entry.result.chart || {}).kind || "line";
      const legendData = eChartsLegendData(entry.series, chartKind);
      const legendLayout = eChartsLegendLayout(entry, legendData);
      const height = Math.max(legendLayout.chartHeight, CHART_MIN_HEIGHT_PX);
      const exportContainer = document.createElement("div");
      exportContainer.style.position = "fixed";
      exportContainer.style.left = "-100000px";
      exportContainer.style.top = "0";
      exportContainer.style.width = width + "px";
      exportContainer.style.height = height + "px";
      exportContainer.style.visibility = "hidden";
      document.body.appendChild(exportContainer);
      const exportChart = window.echarts.init(
        exportContainer,
        null,
        {renderer: format === "png" ? "canvas" : "svg", width, height},
      );
      try {
        exportChart.setOption(
          buildEChartsOptions(entry, eChartsExportTheme(), true),
          {notMerge: true},
        );
        const dataUrl = exportChart.getDataURL({
          type: format,
          pixelRatio: format === "png" ? 2 : 1,
          backgroundColor: "#ffffff",
          excludeComponents: ["toolbox"],
        });
        downloadDataUrl(dataUrl, chartExportFileName(entry.item) + "." + format);
      } finally {
        exportChart.dispose();
        exportContainer.remove();
      }
    }

    function downloadDataUrl(dataUrl, fileName) {
      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function downloadEChartsCsv(entry) {
      const series = entry.series || [];
      if (!series.length) {
        return;
      }
      const rows = [["x", ...series.map((item) => item.name || "series")]];
      const length = Math.max(0, ...series.map((item) => (item.data || []).length));
      for (let index = 0; index < length; index += 1) {
        const firstPoint = (series[0].data || [])[index] || {};
        rows.push([
          firstPoint.x == null ? "" : firstPoint.x,
          ...series.map((item) => {
            const point = (item.data || [])[index] || {};
            return point.y == null ? "" : point.y;
          }),
        ]);
      }
      const csv = rows.map((row) => row.map(csvCell).join(",")).join("\r\n") + "\r\n";
      const blob = new Blob([csv], {type: "text/csv;charset=utf-8"});
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = chartExportFileName(entry.item) + ".csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function csvCell(value) {
      const text = String(value == null ? "" : value);
      return /[",\r\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
    }

    function chartDatetimeBounds(series) {
      const timestamps = [];
      for (const entry of series || []) {
        for (const point of entry.data || []) {
          const parsed = Date.parse(point.x);
          if (Number.isFinite(parsed)) {
            timestamps.push(parsed);
          }
        }
      }
      if (!timestamps.length) {
        return {};
      }
      let min = Math.min(...timestamps);
      let max = Math.max(...timestamps);
      if (min === max) {
        const padding = 60000;
        return {min: min - padding, max: max + padding};
      }
      const padding = Math.max(Math.round((max - min) * 0.03), 1000);
      return {min: min - padding, max: max + padding};
    }

    function chartTitle(title, unit) {
      if (!unit) {
        return title;
      }
      if (title.endsWith(" [" + unit + "]")) {
        return title;
      }
      return title + " [" + unit + "]";
    }

    function chartSeriesLabel(seriesName) {
      const rawName = String(seriesName || "");
      const queryIdMatch = /^(.*)\.(-?\d+)$/.exec(rawName);
      if (!queryIdMatch) {
        return rawName;
      }
      const queryText = queryTextForId(queryIdMatch[2]);
      if (!queryText) {
        return rawName;
      }
      const baseLabel = queryIdMatch[1].split(".").join(" / ");
      const normalizedQuery = String(queryText).replace(/\s+/g, " ").trim();
      const shortQuery = normalizedQuery.length > CHART_QUERY_LABEL_MAX_CHARS
        ? normalizedQuery.slice(0, CHART_QUERY_LABEL_MAX_CHARS - 3).trimEnd() + "..."
        : normalizedQuery;
      return baseLabel + " / SQL: " + shortQuery;
    }

    function formatChartSeriesLabel(seriesName) {
      return escapeChartLabel(chartSeriesLabel(seriesName));
    }

    function buildSortedEChartsTooltip(params, unit, xType, scale) {
      const points = Array.isArray(params) ? params : params ? [params] : [];
      if (!points.length) {
        return "";
      }
      const firstPoint = points[0] || {};
      const hoveredX = firstPoint.axisValue != null
        ? firstPoint.axisValue
        : Array.isArray(firstPoint.value)
          ? firstPoint.value[0]
          : firstPoint.name;
      const entries = [];

      for (const point of points) {
        const rawValue = Array.isArray(point.value) ? point.value[1] : point.value;
        if (rawValue === null || rawValue === undefined) {
          continue;
        }
        const value = Number(rawValue);
        if (!Number.isFinite(value)) {
          continue;
        }
        entries.push({
          seriesIndex: Number(point.seriesIndex) || 0,
          value,
          name: point.seriesName || "Series " + ((Number(point.seriesIndex) || 0) + 1),
          color: safeChartColor(point.color),
        });
      }

      entries.sort((left, right) => right.value - left.value || left.seriesIndex - right.seriesIndex);
      const title = chartTooltipXLabel(hoveredX, xType);
      const rows = entries.map((entry) => {
        return '<div class="ch-diag-chart-tooltip-row">'
          + '<span class="ch-diag-chart-tooltip-marker" style="background:' + entry.color + '"></span>'
          + '<span class="ch-diag-chart-tooltip-label">' + formatChartSeriesLabel(entry.name) + '</span>'
          + '<span class="ch-diag-chart-tooltip-value">' + escapeChartLabel(formatChartTooltipValue(entry.value, unit, scale)) + '</span>'
          + '</div>';
      }).join("");
      return '<div class="ch-diag-chart-tooltip">'
        + '<div class="ch-diag-chart-tooltip-title">' + title + '</div>'
        + '<div class="ch-diag-chart-tooltip-rows">' + rows + '</div>'
        + '</div>';
    }

    function chartTooltipXLabel(value, xType) {
      if (xType === "datetime") {
        return escapeChartLabel(formatChartTimeCoordinate(value));
      }
      return escapeChartLabel(String(value || ""));
    }

    function formatChartTimeCoordinate(value) {
      const timestamp = typeof value === "number" ? value : Date.parse(value);
      if (!Number.isFinite(timestamp)) {
        return String(value || "");
      }
      const date = new Date(timestamp);
      return [date.getHours(), date.getMinutes(), date.getSeconds()]
        .map((part) => String(part).padStart(2, "0"))
        .join(":");
    }

    function safeChartColor(value) {
      const color = String(value || "").trim();
      if (/^#[0-9a-f]{3,8}$/i.test(color) || /^(?:rgb|hsl)a?\([0-9.,%\s]+\)$/i.test(color)) {
        return color;
      }
      return "currentColor";
    }

    function escapeChartLabel(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function chartColors(series) {
      const defaults = [
          "#efd05f",
          "#b38ee8",
          "#84c8e7",
          "#93d083",
          "#e98996",
          "#c7a0ee",
          "#e7a764",
          "#73d2c5",
          "#c9ea5f",
          "#8f9ae8",
          "#d6b45d",
          "#aeb4bd",
      ];
      return series.map((entry, index) => {
        const colorIndex = Number.isInteger(entry._sourceIndex) ? entry._sourceIndex : index;
        return entry._color || defaults[colorIndex % defaults.length];
      });
    }

    function echartsChartType(kind) {
      if (kind === "bar" || kind === "column" || kind === "stacked_bar" || kind === "stacked_column") {
        return "bar";
      }
      return "line";
    }

    function chartUnit(result, series) {
      const configured = (result.chart || {}).unit;
      if (configured) {
        return configured;
      }
      const firstWithUnit = series.find((entry) => entry.unit);
      return firstWithUnit ? firstWithUnit.unit : "";
    }

    function chartAxisScale(series, unit, quantity, stacked) {
      let maximum = 0;
      if (stacked) {
        const totals = new Map();
        for (const entry of series || []) {
          for (const point of entry.data || []) {
            totals.set(point.x, (totals.get(point.x) || 0) + Math.abs(Number(point.y) || 0));
          }
        }
        maximum = Math.max(0, ...totals.values());
      } else {
        for (const entry of series || []) {
          for (const point of entry.data || []) {
            maximum = Math.max(maximum, Math.abs(Number(point.y) || 0));
          }
        }
      }
      if (unit === "bytes" || unit === "bytes/s") {
        const labels = unit === "bytes/s"
          ? ["B/s", "KiB/s", "MiB/s", "GiB/s", "TiB/s", "PiB/s", "EiB/s"]
          : ["B", "KiB", "MiB", "GiB", "TiB", "PiB", "EiB"];
        let factor = 1;
        let index = 0;
        while (maximum >= factor * 1024 && index < labels.length - 1) {
          factor *= 1024;
          index += 1;
        }
        return {factor, label: labels[index]};
      }
      const scalableUnit = chartScalableUnitLabel(unit, quantity);
      if (scalableUnit) {
        const prefixes = ["", "k", "M", "G", "T", "P"];
        let factor = 1;
        let index = 0;
        while (maximum >= factor * 1000 && index < prefixes.length - 1) {
          factor *= 1000;
          index += 1;
        }
        return {factor, label: prefixes[index] + scalableUnit};
      }
      const labels = {
        percent: "%",
        "%": "%",
        ratio: "ratio",
        ms: "ms",
        "ms/s": "ms/s",
        milliseconds: "ms",
        "milliseconds/s": "ms/s",
        seconds: "s",
        load: "load",
      };
      return {factor: 1, label: labels[unit] || unit || ""};
    }

    function chartScalableUnitLabel(unit, quantity) {
      if (unit === "count" || unit === "count/s") {
        const quantityLabel = String(quantity || "count").replace(/_/g, " ");
        return unit === "count" ? quantityLabel : quantityLabel + "/s";
      }
      if (unit === "operations/s") {
        return "ops/s";
      }
      if (unit === "iops") {
        return "IOPS";
      }
      if (unit === "hertz") {
        return "Hz";
      }
      const scalableUnits = new Set([
        "backends",
        "bits/s",
        "blocks",
        "blocks/s",
        "calls",
        "calls/s",
        "connections",
        "connections/s",
        "deadlocks",
        "events",
        "events/s",
        "files",
        "files/s",
        "packets/s",
        "records",
        "records/s",
        "rows",
        "rows/s",
        "scans",
        "scans/s",
        "sessions",
        "sessions/s",
        "transactions",
        "transactions/s",
        "tuples",
        "tuples/s",
        "tx/s",
      ]);
      return scalableUnits.has(unit) ? unit : "";
    }

    function echartsThemeOptions() {
      return {
        text: cssVar("--text"),
        muted: cssVar("--muted"),
        line: cssVar("--line"),
        lineStrong: cssVar("--line-strong"),
        panelSoft: cssVar("--panel-soft"),
        panel: cssVar("--panel"),
        inputBg: cssVar("--input-bg"),
        accent: cssVar("--accent"),
      };
    }

    function eChartsExportTheme() {
      return {
        text: "#21182f",
        muted: "#62566f",
        line: "#d7cfdf",
        lineStrong: "#9b8da8",
        panelSoft: "#f6f3f8",
        panel: "#ffffff",
        inputBg: "#ffffff",
        chartBackground: "#ffffff",
        accent: "#6d3fc0",
      };
    }

    function refreshEChartsTheme() {
      for (const entry of echartsCharts) {
        const currentLegend = ((entry.chart.getOption().legend || [])[0] || {});
        const selected = currentLegend.selected || {};
        const options = buildEChartsOptions(entry);
        options.legend.selected = selected;
        entry.chart.setOption(options, {notMerge: true});
        updateEChartsLegendPanel(entry, selected);
        entry.chart.resize();
      }
    }

    function resizeEChartsLayout(entry) {
      entry.chart.resize();
    }

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function isFiniteNumber(value) {
      return Number.isFinite(Number(value));
    }

    function renderTable(result, item) {
      const itemId = item.item_id || "";
      const rows = Array.isArray(result.rows) ? result.rows : [];
      const allColumns = buildColumns(result.columns, rows);
      const snapshotTimeColumn = allColumns.find((column) => column.name === "snapshot_time");
      const columns = allColumns.filter((column) => column !== snapshotTimeColumn);
      const collectedAt = item.source_kind === "metric" ? null : item.collected_at;
      const tableContextLabels = renderTableContextLabels(
        result,
        rows,
        snapshotTimeColumn,
        allColumns,
        collectedAt,
        item
      );
      if (!rows.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = itemEmptyMessage(item, "No rows");
        if (!tableContextLabels) {
          return empty;
        }
        const container = document.createElement("div");
        container.className = "snapshot-table-result";
        container.appendChild(tableContextLabels);
        container.appendChild(empty);
        return container;
      }
      const defaultSort = normalizeDefaultSort(item, columns);
      const shell = document.createElement("div");
      shell.className = "table-shell";

      const toolbar = document.createElement("div");
      toolbar.className = "table-toolbar";
      const showFilter = rows.length > 1;
      const showPaginationControls = rows.length > 25;
      if (!showPaginationControls) {
        toolbar.classList.add("no-pagination");
      }
      if (!showFilter) {
        toolbar.classList.add("single-row");
      }

      const filter = document.createElement("input");
      filter.className = "input";
      filter.type = "search";
      filter.placeholder = "Filter rows";

      const pageSize = document.createElement("select");
      pageSize.className = "select";
      const requestedPageSize = Number((((artifact.display || {}).table || {}).page_size) || 25);
      const supportedPageSizes = [25, 50, 100, 500];
      const configuredPageSize = supportedPageSizes.includes(requestedPageSize) ? requestedPageSize : 25;
      const pageSizeValues = ["25", "50", "100", "500", "all"];
      for (const value of pageSizeValues) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value === "all" ? "All rows" : value + " rows";
        pageSize.appendChild(option);
      }

      const previous = document.createElement("button");
      previous.type = "button";
      previous.className = "btn";
      previous.textContent = "Prev";

      const next = document.createElement("button");
      next.type = "button";
      next.className = "btn";
      next.textContent = "Next";

      const counter = document.createElement("div");
      counter.className = "row-counter";

      if (showFilter) {
        toolbar.appendChild(filter);
      }
      if (showPaginationControls) {
        toolbar.appendChild(pageSize);
        toolbar.appendChild(previous);
        toolbar.appendChild(next);
      }
      toolbar.appendChild(counter);
      shell.appendChild(toolbar);

      const scroll = document.createElement("div");
      scroll.className = "table-scroll";
      const table = document.createElement("table");
      table.dataset.itemId = itemId;
      const thead = document.createElement("thead");
      const tr = document.createElement("tr");
      const headerCells = [];
      for (const column of columns) {
        const th = document.createElement("th");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "sort-button";
        const label = document.createElement("span");
        setHighlightableText(label, tableColumnLabel(column));
        const indicator = document.createElement("span");
        indicator.className = "sort-indicator";
        indicator.setAttribute("aria-hidden", "true");
        button.appendChild(label);
        button.appendChild(indicator);
        th.appendChild(button);
        tr.appendChild(th);
        headerCells.push(th);
      }
      thead.appendChild(tr);
      table.appendChild(thead);
      const tbody = document.createElement("tbody");
      table.appendChild(tbody);
      scroll.appendChild(table);
      shell.appendChild(scroll);

      const state = {
        rows,
        rowIndexes: new Map(rows.map((row, index) => [row, index])),
        cellStatuses: buildCellStatusMap(result.cell_statuses),
        columnStatuses: result.column_statuses || {},
        columns,
        filteredRows: rows,
        page: 0,
        pageSize: configuredPageSize,
        filter,
        pageSizeInput: pageSize,
        previous,
        next,
        counter,
        tbody,
        headerCells,
        sort: defaultSort,
      };

      headerCells.forEach((th, index) => {
        th.querySelector("button").addEventListener("click", () => {
          if (state.sort && state.sort.columnIndex === index) {
            state.sort.direction = state.sort.direction === "asc" ? "desc" : "asc";
          } else {
            state.sort = {columnIndex: index, direction: "asc"};
          }
          state.page = 0;
          refreshTable(state);
        });
      });
      filter.addEventListener("input", () => {
        state.page = 0;
        refreshTable(state);
      });
      pageSize.addEventListener("change", () => {
        state.pageSize = pageSize.value === "all" ? rows.length || 1 : Number(pageSize.value);
        state.page = 0;
        refreshTable(state);
      });
      previous.addEventListener("click", () => {
        state.page = Math.max(0, state.page - 1);
        refreshTable(state);
      });
      next.addEventListener("click", () => {
        state.page = Math.min(maxPage(state), state.page + 1);
        refreshTable(state);
      });

      tableViews.push(state);
      refreshTable(state);
      if (!tableContextLabels) {
        return shell;
      }
      const container = document.createElement("div");
      container.className = "snapshot-table-result";
      container.appendChild(tableContextLabels);
      container.appendChild(shell);
      return container;
    }

    function tableColumnLabel(column) {
      const original = String(column.label || column.name || "");
      if (column.unit !== "milliseconds") {
        return original;
      }
      return original
        .replace(/\s*\(ms\)\s*$/i, "")
        .replace(/\bms\b/gi, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function renderTableContextLabels(result, rows, column, columns, fallbackValue, item) {
      const deltaLabels = renderDeltaWindowLabels(result.delta_window);
      if (deltaLabels) {
        return deltaLabels;
      }
      const labelName = item && item.collection_scope === "once"
        ? "One-shot time"
        : "Snapshot time";
      return renderSnapshotTimeLabel(rows, column, columns, fallbackValue, labelName);
    }

    function renderDeltaWindowLabels(window) {
      if (!window || !window.start_time || !window.finish_time) {
        return null;
      }
      const labels = document.createElement("div");
      labels.className = "delta-window-labels";
      labels.appendChild(renderTimeContextLabel(
        "Snapshot start time",
        formatBrowserTimestamp(window.start_time),
        String(window.start_time)
      ));
      labels.appendChild(renderTimeContextLabel(
        "Snapshot finish",
        formatBrowserTimestamp(window.finish_time),
        String(window.finish_time)
      ));
      const duration = Number(window.duration_seconds);
      const durationText = Number.isFinite(duration) ? duration.toFixed(3) + " s" : "unknown";
      labels.appendChild(renderTimeContextLabel("Delta duration", durationText));
      return labels;
    }

    function renderTimeContextLabel(name, value, title) {
      const label = document.createElement("div");
      label.className = "snapshot-time-label";
      setHighlightableText(label, name + ": " + value);
      if (title && title !== value) {
        label.title = title;
      }
      return label;
    }

    function renderSnapshotTimeLabel(rows, column, columns, fallbackValue, labelName) {
      let rawValue = fallbackValue;
      let display = null;
      if (column) {
        const snapshotRow = rows.find((row) => {
          const value = Array.isArray(row) ? row[column.sourceIndex] : null;
          return value !== undefined && value !== null && String(value).trim() !== "";
        });
        if (snapshotRow) {
          rawValue = snapshotRow[column.sourceIndex];
          if (String(column.sourceType || "").toLowerCase().includes("datetime")) {
            display = {text: formatBrowserTimestamp(rawValue), title: String(rawValue)};
          } else {
            display = displayValue(rawValue, column, snapshotRow, columns);
          }
        }
      }
      if (rawValue === undefined || rawValue === null || String(rawValue).trim() === "") {
        return null;
      }
      if (!display) {
        display = {text: formatBrowserTimestamp(rawValue), title: String(rawValue)};
      }
      return renderTimeContextLabel(labelName, display.text, display.title);
    }

    function buildColumns(columns, rows) {
      if (Array.isArray(columns) && columns.length > 0) {
        return columns.map((column, index) => {
          let rawName;
          let sourceType = "";
          let descriptor = {};
          if (typeof column === "string") {
            rawName = column;
          } else {
            rawName = column && column.name ? column.name : "column_" + (index + 1);
            sourceType = column && column.source_type ? column.source_type : "";
            descriptor = column || {};
          }
          return {
            name: rawName,
            label: descriptor.label || rawName,
            sourceIndex: index,
            sourceType,
            valueKind: descriptor.value_kind || "text",
            semanticRole: descriptor.semantic_role || "label",
            quantity: descriptor.quantity || "",
            quantityRef: descriptor.quantity_ref || "",
            unit: descriptor.unit || "",
            unitRef: descriptor.unit_ref || "",
            quality: descriptor.quality || "exact",
            nullable: descriptor.nullable !== false,
            encoding: descriptor.encoding || "json_string",
          };
        });
      }
      const width = Array.isArray(rows[0]) ? rows[0].length : 0;
      return Array.from({length: width}, (_, index) => ({
        name: "column_" + (index + 1),
        label: "Column " + (index + 1),
        sourceIndex: index,
        sourceType: "",
        valueKind: "text",
        semanticRole: "label",
        quantity: "text",
        unit: "none",
        quality: "exact",
        nullable: true,
        encoding: "json_string",
      }));
    }

    function buildCellStatusMap(statuses) {
      const result = new Map();
      for (const entry of statuses || []) {
        if (!entry || !Number.isInteger(entry.row_index) || !entry.column) {
          continue;
        }
        result.set(entry.row_index + "\u0000" + entry.column, entry);
      }
      return result;
    }

    function normalizeDefaultSort(item, columns) {
      const display = (item.source_metadata && item.source_metadata.display) || {};
      const defaultSort = display.default_sort || {};
      const columnName = defaultSort.column;
      const direction = defaultSort.direction === "desc" ? "desc" : "asc";
      const columnIndex = columns.findIndex((column) => column.name === columnName);
      if (columnIndex < 0) {
        return null;
      }
      return {columnIndex, direction};
    }

    function refreshTable(state) {
      const localQuery = normalizeQuery(state.filter.value);
      const globalQuery = currentGlobalSearchQuery();
      const applyGlobalRowFilter = Boolean(globalQuery) && state.rows.some((row) => rowMatches(
        row,
        globalQuery,
        state.columns,
        state.cellStatuses,
        state.rowIndexes.get(row)
      ));
      state.filteredRows = state.rows.filter((row) => {
        const originalIndex = state.rowIndexes.get(row);
        if (localQuery && !rowMatches(row, localQuery, state.columns, state.cellStatuses, originalIndex)) {
          return false;
        }
        if (applyGlobalRowFilter && !rowMatches(row, globalQuery, state.columns, state.cellStatuses, originalIndex)) {
          return false;
        }
        return true;
      });
      applySort(state);
      state.page = Math.min(state.page, maxPage(state));
      updateSortIndicators(state);

      const start = state.page * state.pageSize;
      const pageRows = state.filteredRows.slice(start, start + state.pageSize);
      state.tbody.replaceChildren();
      for (const row of pageRows) {
        const tr = document.createElement("tr");
        const originalIndex = state.rowIndexes.get(row);
        for (const column of state.columns) {
          const status = state.cellStatuses.get(originalIndex + "\u0000" + column.name)
            || state.columnStatuses[column.name]
            || null;
          tr.appendChild(renderCell(
            Array.isArray(row) ? row[column.sourceIndex] : undefined,
            column,
            row,
            state.columns,
            status
          ));
        }
        state.tbody.appendChild(tr);
      }

      const total = state.rows.length;
      const filtered = state.filteredRows.length;
      const from = filtered === 0 ? 0 : start + 1;
      const to = Math.min(start + pageRows.length, filtered);
      const pageLabel = filtered === 0 ? "0" : from + "-" + to;
      state.counter.textContent = pageLabel + " of " + filtered + (filtered === total ? " rows" : " filtered rows, " + total + " total");
      state.previous.disabled = state.page === 0;
      state.next.disabled = state.page >= maxPage(state);
    }

    function applySort(state) {
      if (!state.sort) {
        return;
      }
      const column = state.columns[state.sort.columnIndex];
      if (!column) {
        return;
      }
      const direction = state.sort.direction === "desc" ? -1 : 1;
      state.filteredRows = state.filteredRows.slice().sort((left, right) => {
        const leftValue = Array.isArray(left) ? left[column.sourceIndex] : undefined;
        const rightValue = Array.isArray(right) ? right[column.sourceIndex] : undefined;
        const leftEmpty = leftValue === undefined || leftValue === null || leftValue === "";
        const rightEmpty = rightValue === undefined || rightValue === null || rightValue === "";
        if (leftEmpty !== rightEmpty) {
          return leftEmpty ? 1 : -1;
        }
        const leftNumber = numericValue(leftValue, column);
        const rightNumber = numericValue(rightValue, column);
        if ((leftNumber === null) !== (rightNumber === null)) {
          return leftNumber === null ? 1 : -1;
        }
        const compared = compareValues(leftValue, rightValue, column);
        if (compared !== 0) {
          return compared * direction;
        }
        return state.rowIndexes.get(left) - state.rowIndexes.get(right);
      });
    }

    function updateSortIndicators(state) {
      state.headerCells.forEach((th, index) => {
        th.classList.remove("sort-asc", "sort-desc");
        const button = th.querySelector("button");
        if (button) {
          button.removeAttribute("aria-sort");
        }
        if (!state.sort || state.sort.columnIndex !== index) {
          return;
        }
        const direction = state.sort.direction === "desc" ? "desc" : "asc";
        th.classList.add(direction === "desc" ? "sort-desc" : "sort-asc");
        if (button) {
          button.setAttribute("aria-sort", direction === "desc" ? "descending" : "ascending");
        }
      });
    }

    function compareValues(left, right, column) {
      const leftEmpty = left === undefined || left === null || left === "";
      const rightEmpty = right === undefined || right === null || right === "";
      if (leftEmpty && rightEmpty) {
        return 0;
      }
      if (leftEmpty) {
        return 1;
      }
      if (rightEmpty) {
        return -1;
      }
      const leftNumber = numericValue(left, column);
      const rightNumber = numericValue(right, column);
      if (column.encoding === "decimal_string" && column.valueKind === "integer") {
        const leftInteger = parseExactInteger(left);
        const rightInteger = parseExactInteger(right);
        if (leftInteger !== null && rightInteger !== null) {
          return leftInteger < rightInteger ? -1 : leftInteger > rightInteger ? 1 : 0;
        }
      }
      if (column.valueKind === "timestamp") {
        const leftTime = Date.parse(String(left));
        const rightTime = Date.parse(String(right));
        if (Number.isFinite(leftTime) && Number.isFinite(rightTime)) {
          return leftTime - rightTime;
        }
      }
      if (leftNumber !== null && rightNumber !== null) {
        return leftNumber - rightNumber;
      }
      if (column.valueKind === "boolean" && typeof left === "boolean" && typeof right === "boolean") {
        return Number(left) - Number(right);
      }
      return reportCollator().compare(stringifyValue(left), stringifyValue(right));
    }

    function maxPage(state) {
      if (state.filteredRows.length === 0) {
        return 0;
      }
      return Math.ceil(state.filteredRows.length / state.pageSize) - 1;
    }

    function rowMatches(row, query, columns, cellStatuses, originalIndex) {
      if (!Array.isArray(row)) {
        return false;
      }
      return columns.some((column) => {
        const status = cellStatuses.get(originalIndex + "\u0000" + column.name) || null;
        return columnSearchText(row[column.sourceIndex], column, row, columns, status).includes(query);
      });
    }

    function renderCell(value, column, row, columns, status) {
      const td = document.createElement("td");
      const display = displayValue(value, column, row, columns, status);
      const text = display.text;
      const isComplex = display.kind === "complex";
      if (display.kind === "numeric") {
        td.classList.add("numeric");
      }
      if (display.title && display.title !== text) {
        td.title = display.title;
      }
      const content = document.createElement(isComplex ? "pre" : "div");
      content.className = isComplex ? "json-cell cell-content" : "cell-content";
      if (!isComplex && canOpenQueryText(column, value)) {
        content.appendChild(renderQueryIdButton(text, value));
      } else {
        setHighlightableText(content, text);
      }
      td.appendChild(content);

      if (lineCount(text) > CELL_COLLAPSED_LINE_LIMIT) {
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "btn ghost cell-toggle";
        toggle.textContent = "Show more";
        toggle.addEventListener("click", () => {
          const expanded = content.classList.toggle("expanded");
          toggle.textContent = expanded ? "Show less" : "Show more";
        });
        td.appendChild(toggle);
      } else {
        content.classList.add("expanded");
      }
      return td;
    }

    function renderQueryIdButton(label, queryId) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "query-id-button";
      button.title = "Show query";
      setHighlightableText(button, label);
      button.addEventListener("click", () => openQueryTextModal(queryId));
      return button;
    }

    function columnSearchText(value, column, row, columns, status) {
      const display = displayValue(value, column, row, columns, status).text;
      const queryText = canOpenQueryText(column, value) ? queryTextForId(value) : "";
      const statusReason = status && status.reason ? status.reason : "";
      return (display + " " + statusReason + " " + queryText).toLowerCase();
    }

    function canOpenQueryText(column, value) {
      return isQueryIdColumn(column) && Boolean(queryTextForId(value));
    }

    function isQueryIdColumn(column) {
      return String((column || {}).name || "").endsWith("query_id");
    }

    function queryTextForId(queryId) {
      const key = queryIdToText(queryId);
      if (!key || !Object.prototype.hasOwnProperty.call(queryTexts, key)) {
        return "";
      }
      return String(queryTexts[key] || "");
    }

    function queryIdToText(queryId) {
      if (queryId === undefined || queryId === null) {
        return "";
      }
      return String(queryId).trim();
    }

    function lineCount(text) {
      if (!text) {
        return 0;
      }
      return String(text).split(/\r\n|\r|\n/).length;
    }

    function setHighlightableText(node, text) {
      node.__rawText = String(text == null ? "" : text);
      node.dataset.highlightable = "1";
      setHighlightedText(node, node.__rawText, currentGlobalSearchQuery());
    }

    function refreshStaticHighlights(query) {
      document.querySelectorAll("[data-highlightable='1']").forEach((node) => {
        setHighlightedText(node, node.__rawText || "", query);
      });
    }

    function setHighlightedText(node, text, query) {
      const source = String(text == null ? "" : text);
      const needle = normalizeQuery(query);
      node.replaceChildren();
      if (!needle) {
        node.textContent = source;
        return;
      }
      const haystack = source.toLowerCase();
      let cursor = 0;
      while (cursor < source.length) {
        const index = haystack.indexOf(needle, cursor);
        if (index < 0) {
          node.appendChild(document.createTextNode(source.slice(cursor)));
          return;
        }
        if (index > cursor) {
          node.appendChild(document.createTextNode(source.slice(cursor, index)));
        }
        const mark = document.createElement("mark");
        mark.className = "search-highlight";
        mark.textContent = source.slice(index, index + needle.length);
        node.appendChild(mark);
        cursor = index + needle.length;
      }
    }

    function itemSearchText(item) {
      return valueSearchText([
        item.item_id,
        item.section_id,
        item.title,
        item.source_kind,
        collectionStatus(item),
        itemSeverityLevel(item),
        item.reason,
        item.issues,
        item.source_metadata,
        item.result,
      ]);
    }
