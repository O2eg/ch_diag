    function valueSearchText(value) {
      if (value === undefined || value === null) {
        return "";
      }
      if (Array.isArray(value)) {
        return value.map((item) => valueSearchText(item)).join(" ").toLowerCase();
      }
      if (typeof value === "object") {
        return Object.entries(value)
          .map(([key, item]) => key + " " + valueSearchText(item))
          .join(" ")
          .toLowerCase();
      }
      return String(value).toLowerCase();
    }

    function normalizeQuery(value) {
      return String(value || "").trim().toLowerCase();
    }

    function currentGlobalSearchQuery() {
      return normalizeQuery(document.getElementById("itemSearch").value);
    }

    function displayValue(value, column, row, columns, status) {
      if (status) {
        return {
          text: statusLabel(status.status),
          kind: "empty",
          title: status.reason || status.status,
        };
      }
      if (value === undefined || value === null) {
        return {text: "", kind: "empty"};
      }
      if (column.valueKind === "json" || typeof value === "object") {
        return {text: stringifyValue(value), kind: "complex"};
      }
      if (isTemporalColumn(column)) {
        const formatted = formatTemporalValue(value, column);
        return {text: formatted, kind: "text", title: String(value)};
      }
      if (column.valueKind !== "integer" && column.valueKind !== "decimal") {
        return {text: String(value), kind: "text"};
      }
      const unit = unitForRow(column, row, columns);
      const formatted = formatMeasurement(value, column, unit);
      return {text: formatted.text, kind: "numeric", title: formatted.title};
    }

    function statusLabel(value) {
      return String(value || "unavailable")
        .split("_")
        .map((part) => part ? part[0].toUpperCase() + part.slice(1) : part)
        .join(" ");
    }

    function isTemporalColumn(column) {
      return column.valueKind === "timestamp" || column.valueKind === "date" || column.valueKind === "time";
    }

    function formatTemporalValue(value, column) {
      const text = String(value || "").trim();
      if (!text) {
        return "";
      }
      if (column.valueKind === "timestamp") {
        return formatBrowserTimestamp(text);
      }
      if (column.valueKind === "date") {
        const match = /^(\d{4}-\d{2}-\d{2})/.exec(text);
        return match ? match[1] : text;
      }
      const match = /^(\d{2}:\d{2}:\d{2})(?:\.\d+)?(?:Z|[+-]\d{2}(?::?\d{2})?)?$/.exec(text);
      return match ? match[1] : text;
    }

    function unitForRow(column, row, columns) {
      if (!column.unitRef) {
        return column.unit || "none";
      }
      if (!Array.isArray(row)) {
        return "none";
      }
      const unitColumn = columns.find((candidate) => candidate.name === column.unitRef);
      return unitColumn ? String(row[unitColumn.sourceIndex] || "none") : "none";
    }

    function formatMeasurement(value, column, unit) {
      const exactInteger = column.valueKind === "integer" ? parseExactInteger(value) : null;
      const numeric = exactInteger === null ? numericValue(value, column) : Number(exactInteger);
      if (exactInteger === null && numeric === null) {
        return {text: String(value), title: String(value)};
      }
      if (unit === "bytes" && exactInteger !== null) {
        return formatExactBytes(exactInteger, false);
      }
      if (unit === "bytes") {
        return formatAdaptiveBytes(numeric, false);
      }
      if (unit === "bytes/s") {
        return formatAdaptiveBytes(numeric, true);
      }
      if (column.semanticRole === "identifier" && unit === "none") {
        return {text: String(value), title: String(value)};
      }
      if ((unit === "count" || unit === "blocks") && exactInteger !== null) {
        return formatAdaptiveIntegerQuantity(exactInteger, unit);
      }
      if (unit === "milliseconds") {
        return formatAdaptiveMilliseconds(numeric);
      }
      if (unit === "hertz" || unit === "bits/s") {
        return formatAdaptiveSi(numeric, unit === "hertz" ? "Hz" : "bit/s");
      }
      const integerText = exactInteger === null ? null : formatGroupedInteger(exactInteger);
      const decimalText = integerText === null ? formatDecimalValue(numeric, 3) : integerText;
      const suffixes = {
        "blocks/s": " blocks/s",
        "milliseconds/s": " ms/s",
        "seconds": " s",
        "percent": "%",
        "count/s": "/s",
        "operations/s": " ops/s",
        "iops": " IOPS",
        "hertz": " Hz",
        "bits": " bits",
        "bits/s": " bits/s",
      };
      const text = decimalText + (suffixes[unit] || "");
      return {text, title: String(value) + (unit === "none" || unit === "count" || unit === "ratio" || unit === "load" ? "" : " " + unit)};
    }

    function formatAdaptiveIntegerQuantity(value, unit) {
      const negative = value < 0n;
      const absolute = negative ? -value : value;
      const suffixes = ["", "K", "M", "G", "T", "P"];
      let factor = 1n;
      let index = 0;
      while (absolute >= factor * 1000n && index < suffixes.length - 1) {
        factor *= 1000n;
        index += 1;
      }
      const exactText = formatGroupedInteger(value);
      if (index === 0) {
        return {
          text: exactText,
          title: "exact: " + exactText + (unit === "blocks" ? " blocks" : ""),
        };
      }
      let thousandths = (absolute * 1000n + factor / 2n) / factor;
      if (thousandths >= 1000000n && index < suffixes.length - 1) {
        factor *= 1000n;
        index += 1;
        thousandths = (absolute * 1000n + factor / 2n) / factor;
      }
      const whole = thousandths / 1000n;
      const fraction = thousandths % 1000n;
      const fractionText = fraction === 0n
        ? ""
        : "." + String(fraction).padStart(3, "0").replace(/0+$/, "");
      const sign = negative && thousandths !== 0n ? "-" : "";
      return {
        text: sign + formatGroupedInteger(whole) + fractionText + " " + suffixes[index],
        title: "exact: " + exactText + (unit === "blocks" ? " blocks" : ""),
      };
    }

    function formatAdaptiveMilliseconds(value) {
      if (!Number.isFinite(value)) {
        return {text: String(value), title: String(value)};
      }
      const exactText = formatDecimalValue(value, 3);
      const sign = value < 0 ? "-" : "";
      const absolute = Math.abs(value);
      if (absolute < 1000) {
        return {text: exactText + " ms", title: "exact: " + exactText + " ms"};
      }
      if (absolute < 60000) {
        return {
          text: sign + formatDecimalValue(roundHalfAway(absolute / 1000, 3), 3) + " s",
          title: "exact: " + exactText + " ms",
        };
      }
      const roundedMilliseconds = Math.round(absolute);
      const hours = Math.floor(roundedMilliseconds / 3600000);
      const afterHours = roundedMilliseconds % 3600000;
      const minutes = Math.floor(afterHours / 60000);
      const seconds = (afterHours % 60000) / 1000;
      const parts = [];
      if (hours) {
        parts.push(formatGroupedInteger(hours) + " h");
      }
      if (minutes) {
        parts.push(String(minutes) + " min");
      }
      if (seconds || !parts.length) {
        parts.push(formatDecimalValue(seconds, 3) + " s");
      }
      return {text: sign + parts.join(" "), title: "exact: " + exactText + " ms"};
    }

    function formatAdaptiveSi(value, suffix) {
      const prefixes = ["", "k", "M", "G", "T", "P"];
      let scaled = Math.abs(value);
      let index = 0;
      while (scaled >= 1000 && index < prefixes.length - 1) {
        scaled /= 1000;
        index += 1;
      }
      const signed = roundHalfAway(scaled * (value < 0 ? -1 : 1), 2);
      return {
        text: formatDecimalValue(signed, 2) + " " + prefixes[index] + suffix,
        title: "exact: " + formatDecimalValue(value, 3) + " " + suffix,
      };
    }

    function numericValue(value, column) {
      if (column && column.valueKind !== "integer" && column.valueKind !== "decimal") {
        return null;
      }
      if (typeof value === "number") {
        return Number.isFinite(value) ? value : null;
      }
      if (typeof value !== "string" || value.trim() === "") {
        return null;
      }
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function parseExactInteger(value) {
      if (typeof value === "bigint") {
        return value;
      }
      if (typeof value === "number" && Number.isSafeInteger(value)) {
        return BigInt(value);
      }
      if (typeof value !== "string" || !/^-?(?:0|[1-9][0-9]*)$/.test(value)) {
        return null;
      }
      try {
        return BigInt(value);
      } catch (error) {
        return null;
      }
    }

    function formatGroupedInteger(value) {
      return new Intl.NumberFormat(numericLocale(), {maximumFractionDigits: 0}).format(value);
    }

    function formatExactBytes(value, perSecond) {
      const suffixes = perSecond
        ? ["B/s", "KiB/s", "MiB/s", "GiB/s", "TiB/s", "PiB/s", "EiB/s"]
        : ["B", "KiB", "MiB", "GiB", "TiB", "PiB", "EiB"];
      const negative = value < 0n;
      const absolute = negative ? -value : value;
      let factor = 1n;
      let index = 0;
      while (index < suffixes.length - 1 && absolute >= factor * 1024n) {
        factor *= 1024n;
        index += 1;
      }
      if (index === 0) {
        const text = formatGroupedInteger(value) + " " + suffixes[0];
        return {text, title: "exact: " + formatGroupedInteger(value) + " B" + (perSecond ? "/s" : "")};
      }
      let hundredths = (absolute * 100n + factor / 2n) / factor;
      if (hundredths >= 102400n && index < suffixes.length - 1) {
        factor *= 1024n;
        index += 1;
        hundredths = (absolute * 100n + factor / 2n) / factor;
      }
      const whole = hundredths / 100n;
      const fraction = hundredths % 100n;
      const fractionText = fraction === 0n ? "" : "." + String(fraction).padStart(2, "0").replace(/0+$/, "");
      const sign = negative && hundredths !== 0n ? "-" : "";
      return {
        text: sign + formatGroupedInteger(whole) + fractionText + " " + suffixes[index],
        title: "exact: " + formatGroupedInteger(value) + " B" + (perSecond ? "/s" : ""),
      };
    }

    function formatAdaptiveBytes(value, perSecond) {
      if (!Number.isFinite(value)) {
        return {text: String(value), title: String(value)};
      }
      const suffixes = perSecond
        ? ["B/s", "KiB/s", "MiB/s", "GiB/s", "TiB/s", "PiB/s", "EiB/s"]
        : ["B", "KiB", "MiB", "GiB", "TiB", "PiB", "EiB"];
      const sign = value < 0 ? -1 : 1;
      let scaled = Math.abs(value);
      let index = 0;
      while (scaled >= 1024 && index < suffixes.length - 1) {
        scaled /= 1024;
        index += 1;
      }
      let rounded = roundHalfAway(scaled * sign, 2);
      if (Math.abs(rounded) >= 1024 && index < suffixes.length - 1) {
        rounded = roundHalfAway(rounded / 1024, 2);
        index += 1;
      }
      if (Object.is(rounded, -0)) {
        rounded = 0;
      }
      return {
        text: formatDecimalValue(rounded, index === 0 ? 0 : 2) + " " + suffixes[index],
        title: "exact: " + formatDecimalValue(value, 3) + " B" + (perSecond ? "/s" : ""),
      };
    }

    function formatChartAxisValue(value, unit, scale) {
      if (!Number.isFinite(Number(value))) {
        return "";
      }
      const numeric = Number(value) / Number((scale || {}).factor || 1);
      return formatDecimalValue(numeric, unit === "percent" ? 2 : 3);
    }

    function formatChartTooltipValue(value, unit, scale) {
      if (!Number.isFinite(Number(value))) {
        return "";
      }
      const numeric = Number(value) / Number((scale || {}).factor || 1);
      const label = String((scale || {}).label || "");
      const formatted = formatDecimalValue(
        numeric,
        unit === "percent" || unit === "%" ? 2 : 3,
      );
      if (!label) {
        return formatted;
      }
      return label === "%" ? formatted + label : formatted + " " + label;
    }

    function formatCompactMetricValue(value, base) {
      const sign = value < 0 ? -1 : 1;
      let scaled = Math.abs(value);
      const suffixes = ["", "k", "M", "G", "T", "P"];
      let index = 0;
      while (scaled >= base && index < suffixes.length - 1) {
        scaled /= base;
        index += 1;
      }
      return formatDecimalValue(roundHalfAway(scaled * sign, 2), 2) + suffixes[index];
    }

    function formatDecimalValue(value, maxDigits) {
      return new Intl.NumberFormat(numericLocale(), {
        minimumFractionDigits: 0,
        maximumFractionDigits: maxDigits,
        useGrouping: true,
      }).format(value);
    }

    function roundHalfAway(value, digits) {
      const factor = 10 ** digits;
      const rounded = Math.floor(Math.abs(value) * factor + 0.5 + Number.EPSILON) / factor;
      return value < 0 ? -rounded : rounded;
    }

    function numericLocale() {
      return String(((artifact.display || {}).numeric_locale) || "en-US");
    }

    function reportCollator() {
      if (!cachedReportCollator) {
        cachedReportCollator = new Intl.Collator(numericLocale(), {numeric: true, sensitivity: "base"});
      }
      return cachedReportCollator;
    }

    function stringifyValue(value) {
      if (value === undefined || value === null) {
        return "";
      }
      if (typeof value === "object") {
        try {
          return JSON.stringify(value, null, 2);
        } catch (error) {
          return String(value);
        }
      }
      return String(value);
    }

    function bindReportControls() {
      document.getElementById("expandAll").addEventListener("click", () => {
        document.querySelectorAll("details.section, details.item").forEach((node) => {
          setDetailsOpen(node, true, true);
        });
        window.setTimeout(() => updateSectionControlButtons(document), DETAILS_ANIMATION_MS);
      });
      document.getElementById("collapseAll").addEventListener("click", () => {
        document.querySelectorAll("details.section, details.item").forEach((node) => {
          setDetailsOpen(node, false, true);
        });
        window.setTimeout(() => updateSectionControlButtons(document), DETAILS_ANIMATION_MS);
      });
      document.getElementById("itemSearch").addEventListener("input", applyReportFilters);
      document.getElementById("itemTypeFilter").addEventListener("change", applyReportFilters);
      document.getElementById("collectionStatusFilter").addEventListener("change", applyReportFilters);
      document.getElementById("severityLevelFilter").addEventListener("change", applyReportFilters);
      document.getElementById("tagFilter").addEventListener("change", applyReportFilters);
      document.getElementById("themeToggle").addEventListener("change", (event) => {
        setTheme(event.target.checked ? "light" : "dark", true);
      });
    }

    function bindSourceModalControls() {
      const modal = document.getElementById("sourceModal");
      document.getElementById("closeSource").addEventListener("click", closeSourceModal);
      document.getElementById("copySource").addEventListener("click", copyCurrentSource);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeSourceModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeSourceModal();
        }
      });
    }

    function bindMetaModalControls() {
      const modal = document.getElementById("metaModal");
      const tabs = [document.getElementById("metaTotalTab"), document.getElementById("metaRawTab")];
      document.getElementById("closeMeta").addEventListener("click", closeMetaModal);
      tabs[0].addEventListener("click", () => selectMetaTab("total"));
      tabs[1].addEventListener("click", () => selectMetaTab("raw"));
      document.querySelector(".meta-tabs").addEventListener("keydown", (event) => {
        if (!["ArrowLeft", "ArrowRight", "Home", "End"].includes(event.key)) {
          return;
        }
        event.preventDefault();
        const currentIndex = tabs.indexOf(document.activeElement);
        let nextIndex = currentIndex < 0 ? 0 : currentIndex;
        if (event.key === "ArrowLeft") {
          nextIndex = (nextIndex + tabs.length - 1) % tabs.length;
        } else if (event.key === "ArrowRight") {
          nextIndex = (nextIndex + 1) % tabs.length;
        } else if (event.key === "Home") {
          nextIndex = 0;
        } else if (event.key === "End") {
          nextIndex = tabs.length - 1;
        }
        selectMetaTab(nextIndex === 1 ? "raw" : "total", true);
      });
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeMetaModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeMetaModal();
        }
      });
    }

    function bindInstructionModalControls() {
      const modal = document.getElementById("instructionModal");
      document.getElementById("closeInstruction").addEventListener("click", closeInstructionModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeInstructionModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeInstructionModal();
        }
      });
    }

    function bindPageScrollControls() {
      const topButton = document.getElementById("scrollToTop");
      const bottomButton = document.getElementById("scrollToBottom");
      topButton.addEventListener("click", () => {
        window.scrollTo({top: 0, behavior: scrollBehavior()});
      });
      bottomButton.addEventListener("click", () => {
        window.scrollTo({top: document.documentElement.scrollHeight, behavior: scrollBehavior()});
      });
      window.addEventListener("scroll", requestPageScrollControlsUpdate, {passive: true});
      window.addEventListener("resize", () => {
        requestPageScrollControlsUpdate();
        for (const entry of echartsCharts) {
          if (isVisibleThroughDetails(entry.container)) {
            resizeEChartsLayout(entry);
          }
        }
      });
      requestPageScrollControlsUpdate();
    }

    function scrollBehavior() {
      return shouldReduceMotion() ? "auto" : "smooth";
    }

    function requestPageScrollControlsUpdate() {
      if (scrollControlsRaf) {
        return;
      }
      scrollControlsRaf = window.requestAnimationFrame(() => {
        scrollControlsRaf = 0;
        updatePageScrollControls();
      });
    }

    function updatePageScrollControls() {
      const topButton = document.getElementById("scrollToTop");
      const bottomButton = document.getElementById("scrollToBottom");
      if (!topButton || !bottomButton) {
        return;
      }
      const root = document.documentElement;
      const maxScroll = Math.max(0, root.scrollHeight - window.innerHeight);
      const scrollTop = window.scrollY || root.scrollTop || document.body.scrollTop || 0;
      const progress = maxScroll > 0 ? scrollTop / maxScroll : 1;
      setScrollButtonVisible(topButton, scrollTop > 80);
      setScrollButtonVisible(bottomButton, maxScroll > 80 && progress < 0.9);
    }

    function setScrollButtonVisible(button, visible) {
      button.classList.toggle("visible", visible);
      button.disabled = !visible;
      button.setAttribute("aria-hidden", visible ? "false" : "true");
      button.tabIndex = visible ? 0 : -1;
    }

    function hydrateTheme() {
      setTheme(readStoredTheme(), false);
    }

    function readStoredTheme() {
      try {
        return localStorage.getItem("ch_diag_theme") === "light" ? "light" : "dark";
      } catch (error) {
        return "dark";
      }
    }

    function setTheme(theme, persist) {
      const normalized = theme === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = normalized;
      const toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.checked = normalized === "light";
      }
      if (echartsCharts.length) {
        window.requestAnimationFrame(refreshEChartsTheme);
      }
      if (!persist) {
        return;
      }
      try {
        localStorage.setItem("ch_diag_theme", normalized);
      } catch (error) {
        // Local files may run with storage disabled.
      }
    }

    function applyReportFilters() {
      const query = currentGlobalSearchQuery();
      const itemType = document.getElementById("itemTypeFilter").value;
      const collection = document.getElementById("collectionStatusFilter").value;
      const severity = document.getElementById("severityLevelFilter").value;
      const tag = document.getElementById("tagFilter").value;
      updateFilteredTagHighlights(tag);
      let visibleTotal = 0;
      for (const section of document.querySelectorAll("details.section")) {
        const sectionMatchesQuery = Boolean(query) && (section.__searchText || "").includes(query);
        let visibleCount = 0;
        for (const item of section.querySelectorAll("details.item")) {
          const itemOwnMatch = (item.__searchText || "").includes(query);
          const matchesQuery = !query || sectionMatchesQuery || itemOwnMatch;
          const matchesType = !itemType || item.dataset.itemType === itemType;
          const matchesCollection = !collection || item.dataset.collectionStatus === collection;
          const matchesSeverity = !severity || item.dataset.severityLevel === severity;
          const matchesTag = !tag || (item.__tags || []).includes(tag);
          const visible = matchesQuery && matchesType && matchesCollection && matchesSeverity && matchesTag;
          item.classList.toggle("hidden", !visible);
          if (visible) {
            visibleCount += 1;
            visibleTotal += 1;
            if (query && itemOwnMatch && !sectionMatchesQuery) {
              setDetailsOpen(item, true, true);
            }
          }
        }
        section.classList.toggle("hidden", visibleCount === 0);
        if (query && visibleCount > 0) {
          setDetailsOpen(section, true, true);
        }
      }
      updateVisibleSummary(visibleTotal);
      for (const table of tableViews) {
        table.page = 0;
        refreshTable(table);
      }
      refreshStaticHighlights(query);
      requestPageScrollControlsUpdate();
    }

    function updateFilteredTagHighlights(selectedTag) {
      const activeTag = String(selectedTag || "");
      for (const badge of document.querySelectorAll(".item-tag")) {
        const matches = Boolean(activeTag) && badge.dataset.tag === activeTag;
        badge.classList.toggle("filter-match", matches);
        if (matches) {
          badge.setAttribute("aria-current", "true");
        } else {
          badge.removeAttribute("aria-current");
        }
      }
    }

    function updateVisibleSummary(visibleTotal) {
      const node = document.getElementById("visibleSummary");
      if (!node) {
        return;
      }
      node.textContent = "Showing " + visibleTotal + " from " + visibleItems.length;
    }

    function itemTags(item) {
      const tags = (((item || {}).source_metadata || {}).tags || []);
      if (!Array.isArray(tags)) {
        return [];
      }
      const normalized = [];
      const seen = new Set();
      for (const tag of tags) {
        const text = String(tag || "").trim();
        if (text && !seen.has(text)) {
          normalized.push(text);
          seen.add(text);
        }
      }
      return normalized;
    }

    function compareTags(left, right) {
      const leftIndex = TAG_ORDER.indexOf(left);
      const rightIndex = TAG_ORDER.indexOf(right);
      if (leftIndex >= 0 && rightIndex >= 0) {
        return leftIndex - rightIndex;
      }
      if (leftIndex >= 0) {
        return -1;
      }
      if (rightIndex >= 0) {
        return 1;
      }
      return String(left).localeCompare(String(right), undefined, {numeric: true, sensitivity: "base"});
    }
  </script>
</body>
